function mkPartijen(){
  return HD.map((p,i)=>({
    id:i+1, datum:p[0],
    beurten:p[1].map((c,j)=>({id:i*1000+j,caramboles:c,gemist:[],goed:[]}))
  }));
}

function stat(beurten){
  if(!beurten||!beurten.length)return null;
  const cars=beurten.map(b=>b.caramboles);
  const totCar=cars.reduce((a,b)=>a+b,0);
  const mx=Math.max(...cars);
  const totPunten=beurten.reduce((a,b)=>a+pts(b.caramboles),0);
  const poedels=beurten.filter(b=>b.caramboles===0).length;
  const gemPerBeurt=(totCar/beurten.length).toFixed(2);
  const opbouw5=beurten.filter(b=>b.caramboles>=5).length;
  const opbouw57=beurten.filter(b=>b.caramboles>=5&&b.caramboles<=7).length;
  const opbouw89=beurten.filter(b=>b.caramboles>=8&&b.caramboles<=9).length;
  const opbouw10=beurten.filter(b=>b.caramboles>=10).length;
  return{totCar,max:mx,totPunten,aantalBeurten:beurten.length,poedels,gemPerBeurt,opbouw5,opbouw57,opbouw89,opbouw10};
}

async function laadData(){
  try{
    const r=await window.storage.get(SK);
    if(r){const d=JSON.parse(r.value);if(d.partijen&&d.partijen.length>0)return d;}
  }catch(e){}
  return{huidigeId:900,partijen:mkPartijen()};
}
async function slaOp(d){try{await window.storage.set(SK,JSON.stringify(d));}catch(e){}}

function Grafiek({beurten}){
  if(!beurten||beurten.length<2)return null;
  const vals=beurten.map(b=>b.caramboles);
  const maxV=Math.max(...vals,1);
  const ppp=Math.max(6,Math.min(18,300/vals.length));
  const lp=8,tp=12,H=40;
  const W=lp+ppp*(vals.length-1);
  const ps=vals.map((v,i)=>`${lp+i*ppp},${tp+H-(v/maxV)*H}`).join(" ");
  return(
    <div style={{overflowX:"auto"}}>
      <svg width={Math.max(W,40)} height={H+tp+6} style={{overflow:"visible",display:"block"}}>
        <polyline points={ps} fill="none" stroke={GOUD} strokeWidth="1.5" strokeLinejoin="round"/>
        {vals.map((v,i)=>{
          const cx=lp+i*ppp,cy=tp+H-(v/maxV)*H;
          const k=v>=10?"#ff9f40":v>=8?"#e8c96a":v>=5?GRNT:GOUD;
          return<circle key={i} cx={cx} cy={cy} r={v>=5?3:2} fill={k}/>;
        })}
      </svg>
    </div>
  );
}

            <span style={{fontSize:14}}>{o.emoji}</span>
            <span>{o.label}</span>
          </button>
        );
      })}
    </div>
  );
}

  useEffect(()=>{laadData().then(setData);},[]);
  if(!data)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:GOUD,fontSize:18,background:G}}>Laden…</div>;

  const alleP=data.partijen;
  const stL=stat(lp);
  const ptsNu=pts(car);
  const totCarLp=lp.reduce((a,b)=>a+b.caramboles,0);
  const voortgang=doelType==="beurten"?lp.length:totCarLp;
  const progPct=Math.min(100,Math.round(voortgang/doel*100));

  function toggle(key){setSel(prev=>{const n=new Set(prev);n.has(key)?n.delete(key):n.add(key);return n;});}

  function noteer(){
    const gemist=[...sel].filter(k=>k.startsWith("G__")).map(k=>k.replace("G__",""));
    const goed=[...sel].filter(k=>k.startsWith("P__")).map(k=>k.replace("P__",""));
    const b={id:data.huidigeId,caramboles:car,punten:ptsNu,gemist,goed,tijd:new Date().toISOString()};
    const nd={...data,huidigeId:data.huidigeId+1};
    setData(nd);slaOp(nd);
    setLp(p=>[...p,b]);
    setCar(0);setInp("0");setBeurtNr(n=>n+1);setSel(new Set());setFase("invoer");
    const f=`Beurt ${beurtNr} · ${car} car${ptsNu>0?` · +${ptsNu}pt`:car===0?" · poedel":""}`;
    setFb(f);setTimeout(()=>setFb(""),1800);
  }

  function sluit(){
    if(!lp.length){setConfPartij(false);return;}
    const st=stat(lp);
    const p={id:data.huidigeId,datum:new Date().toISOString(),beurten:lp,...st};
    const nd={partijen:[...data.partijen,p],huidigeId:data.huidigeId+1};
    setData(nd);slaOp(nd);
    setLp([]);setBeurtNr(1);setCar(0);setInp("0");setSel(new Set());
    setConfPartij(false);setFase("setup");
    setFb(`✓ Partij opgeslagen · ${st.aantalBeurten}b · ${st.totCar}car · gem ${st.gemPerBeurt}`);
    setTimeout(()=>setFb(""),3000);
  }

  function resetAlles(){
    const leeg={partijen:[],huidigeId:1};
    setData(leeg);slaOp(leeg);setLp([]);setBeurtNr(1);setCar(0);setInp("0");
    setSel(new Set());setConfReset(false);setFase("setup");
  }

  function bouwTekst(){
    const stA=stat(alleP.flatMap(p=>p.beurten));
    const r=[`BILJART DATA — ${new Date().toLocaleDateString("nl-NL",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}`,"=".repeat(40)];
    if(stA)r.push(`TOTAAL: ${alleP.length} partijen · ${stA.totCar}car · gem ${stA.gemPerBeurt} · max ${stA.max} · ${stA.poedels} poedels · ${stA.totPunten}pt`);
    [...alleP].reverse().forEach((p,i)=>{
      const st=stat(p.beurten);
      r.push(`\nPartij ${alleP.length-i} · ${new Date(p.datum).toLocaleDateString("nl-NL",{weekday:"long",day:"numeric",month:"long"})}`);
      if(st)r.push(`${st.aantalBeurten}b · max ${st.max} · gem ${st.gemPerBeurt} · ${st.poedels}x poedel · ${st.totPunten}pt · 🎯${st.opbouw5}x5+`);
      p.beurten.forEach((b,j)=>{
        const g=(b.gemist||[]).join(", "),gd=(b.goed||[]).join(", ");
        let rule=`  B${j+1}: ${b.caramboles}car${pts(b.caramboles)>0?` +${pts(b.caramboles)}pt`:""}${b.caramboles===0?" [poedel]":""}`;
        if(g)rule+=` — Gemist: ${g}`;if(gd)rule+=` — Goed: ${gd}`;r.push(rule);
      });
    });
    return r.join("\n");
  }

          </div>
        )}
        <button style={{padding:18,background:`linear-gradient(135deg,${GOUD},${GOUDL})`,border:"none",borderRadius:12,color:G,fontSize:17,fontWeight:"bold",cursor:"pointer",fontFamily:"inherit",boxShadow:"0 6px 20px rgba(201,168,76,0.35)"}}
          onClick={()=>{setLp([]);setBeurtNr(1);setCar(0);setInp("0");setSel(new Set());setFase("invoer");}}>
          🎱 Start partij
        </button>
        {fb&&<div style={{textAlign:"center",fontSize:12,color:GOUDL}}>{fb}</div>}
      </div>
    );

    if(fase==="invoer"){
      // Bereken serie-verdeling
      const s57=lp.filter(b=>b.caramboles>=5&&b.caramboles<=7).length;
      const s89=lp.filter(b=>b.caramboles>=8&&b.caramboles<=9).length;
      const s10=lp.filter(b=>b.caramboles>=10).length;
      const poedels=lp.filter(b=>b.caramboles===0).length;
      const poedelPct=lp.length>0?Math.round(poedels/lp.length*100):0;
      const opbouwPct=lp.length>0?Math.round((stL?stL.opbouw5:0)/lp.length*100):0;

      return(
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>

          {/* Voortgangsbalk */}
          <div style={{height:3,background:KBDR,flexShrink:0}}>
            <div style={{height:3,background:GOUD,width:`${progPct}%`,transition:"width 0.3s"}}/>
          </div>

          {/* DASHBOARD */}
          <div style={{padding:"10px 12px 6px",flexShrink:0}}>

            {/* Rij 1: 4 hoofdcijfers */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:6}}>
              {[
                {l:"Beurt",v:beurtNr,k:WIT},
                {l:"Caramboles",v:stL?stL.totCar:0,k:GOUD},
                {l:"Gemiddelde",v:stL?stL.gemPerBeurt:"—",k:GOUDL},
                {l:"Punten",v:stL?stL.totPunten:0,k:"#e8a84c"},
              ].map(({l,v,k})=>(
                <div key={l} style={{textAlign:"center",background:"#182e14",border:`1px solid ${KBDR}`,borderRadius:8,padding:"7px 2px"}}>
                  <div style={{fontSize:22,fontWeight:"bold",color:k,lineHeight:1}}>{v}</div>
                  <div style={{fontSize:8,color:WITD,marginTop:3,textTransform:"uppercase",letterSpacing:0.5}}>{l}</div>
                </div>
              ))}
            </div>

            {/* Rij 2: opbouw + poedels + serie-verdeling */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 2fr",gap:6,marginBottom:6}}>
              {/* Opbouw */}
              <div style={{background:"#182e14",border:`1px solid ${KBDR}`,borderRadius:8,padding:"7px 6px",textAlign:"center"}}>
                <div style={{fontSize:18,fontWeight:"bold",color:GRNT,lineHeight:1}}>{stL?stL.opbouw5:0}×</div>
                <div style={{fontSize:8,color:WITD,marginTop:3,textTransform:"uppercase",letterSpacing:0.5}}>Opbouw ≥5</div>
                <div style={{fontSize:10,color:GRNT,marginTop:1}}>{opbouwPct}%</div>
              </div>
              {/* Poedels */}
              <div style={{background:"#182e14",border:`1px solid ${KBDR}`,borderRadius:8,padding:"7px 6px",textAlign:"center"}}>
                <div style={{fontSize:18,fontWeight:"bold",color:poedels>0?"#e08055":WITD,lineHeight:1}}>{poedels}×</div>
                <div style={{fontSize:8,color:WITD,marginTop:3,textTransform:"uppercase",letterSpacing:0.5}}>Poedels</div>
                <div style={{fontSize:10,color:poedels>0?"#e08055":WITD,marginTop:1}}>{poedelPct}%</div>
              </div>
              {/* Serie verdeling */}
              <div style={{background:"#182e14",border:`1px solid ${KBDR}`,borderRadius:8,padding:"7px 8px"}}>
                <div style={{fontSize:8,color:WITD,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>Series</div>
                <div style={{display:"flex",gap:4,justifyContent:"space-around"}}>
                  {[["5-7",s57,"#4caf50"],["8-9",s89,"#e8c96a"],["10+",s10,"#ff9f40"]].map(([l,n,k])=>(
                    <div key={l} style={{textAlign:"center"}}>
                      <div style={{fontSize:16,fontWeight:"bold",color:n>0?k:KBDR}}>{n}</div>
                      <div style={{fontSize:8,color:WITD}}>{l}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Grafiek */}
            {lp.length>1&&(
              <div style={{background:"#182e14",border:`1px solid ${KBDR}`,borderRadius:8,padding:"6px 8px"}}>
                <Grafiek beurten={lp}/>
              </div>
            )}
          </div>

          {/* Invoer — flex groeit om ruimte op te vullen */}
          <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 20px",minHeight:0}}>
            <div style={{fontSize:9,textTransform:"uppercase",letterSpacing:2,color:WITD,marginBottom:8}}>Beurt {beurtNr}</div>
            <div style={{display:"flex",alignItems:"center",gap:18,marginBottom:6}}>
              <button style={{width:46,height:46,borderRadius:"50%",background:"none",border:`2px solid ${GOUD}`,color:GOUD,fontSize:24,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}
                onClick={()=>{const n=Math.max(0,car-1);setCar(n);setInp(String(n));}}>−</button>
              <input ref={inputRef} type="number" inputMode="numeric" pattern="[0-9]*" value={inp}
                onChange={e=>{const v=e.target.value;if(v===""||v==="-"){setInp(v);return;}const n=parseInt(v);if(!isNaN(n)&&n>=0){setCar(n);setInp(String(n));}}}
                onFocus={e=>e.target.select()}
                onKeyDown={e=>{if(e.key==="Enter")setFase("gemist");}}
                style={{width:86,fontSize:48,fontWeight:"bold",color:WIT,background:"transparent",border:"none",borderBottom:`3px solid ${car>=5?GRNT:GOUD}`,textAlign:"center",fontFamily:"Georgia,serif",outline:"none",paddingBottom:3}}
              />
              <button style={{width:46,height:46,borderRadius:"50%",background:"none",border:`2px solid ${GOUD}`,color:GOUD,fontSize:24,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}
                onClick={()=>{const n=car+1;setCar(n);setInp(String(n));}}>+</button>
            </div>
            <div style={{fontSize:12,color:car>=5?GRNT:GOUD,minHeight:16,textAlign:"center"}}>
              {car===0?"Poedel":car<3?`Nog ${3-car} voor een punt`:`${ptsNu} punt${ptsNu!==1?"en":""}${car>=5?" 🎯":""}`}
            </div>
            {fb&&<div style={{marginTop:4,fontSize:11,color:GOUDL,textAlign:"center"}}>{fb}</div>}
          </div>

          {/* Knop */}
          <div style={{padding:"8px 12px",display:"flex",gap:8,flexShrink:0}}>
            <button style={{flex:1,padding:14,background:`linear-gradient(135deg,${GOUD},${GOUDL})`,border:"none",borderRadius:12,color:G,fontSize:16,fontWeight:"bold",cursor:"pointer",fontFamily:"inherit"}}
              onClick={()=>setFase("gemist")}>Volgende →</button>
            <button style={{padding:"14px 13px",background:"none",border:`1px solid ${KBDR}`,borderRadius:12,color:WITD,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}
              onClick={()=>{if(lp.length){setLp(p=>p.slice(0,-1));setBeurtNr(n=>Math.max(1,n-1));}}}>↩</button>
          </div>
        </div>
      );
    }

    if(fase==="gemist"){
      const gs=[...sel].filter(k=>k.startsWith("G__"));
      return(
        <div style={{flex:1,display:"flex",flexDirection:"column"}}>
          <div style={{padding:"7px 14px",borderBottom:`1px solid ${KBDR}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
            <div style={{fontSize:12,color:ROOD,fontWeight:"bold"}}>❌ Gemist door — {car} caramboles</div>
            {gs.length>0&&<span style={{fontSize:11,color:ROOD}}>{gs.length}×</span>}
          </div>
          <div style={{flex:1,overflowY:"auto"}}>
            <OpmGrid lijst={GEMIST} prefix="G__" kleur={ROOD} geselecteerd={sel} toggle={toggle}/>
          </div>
          <div style={{padding:"10px 14px",display:"flex",gap:8,flexShrink:0}}>
            <button style={{flex:1,padding:15,background:`linear-gradient(135deg,${GOUD},${GOUDL})`,border:"none",borderRadius:12,color:G,fontSize:15,fontWeight:"bold",cursor:"pointer",fontFamily:"inherit"}}
              onClick={()=>setFase("goed")}>Wat ging goed? →</button>
            <button style={{padding:"15px 12px",background:"none",border:`1px solid ${KBDR}`,borderRadius:12,color:WITD,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}
              onClick={()=>setFase("invoer")}>←</button>
          </div>
        </div>
      );
    }

    if(fase==="goed"){
      const gs=[...sel].filter(k=>k.startsWith("P__"));
      return(
        <div style={{flex:1,display:"flex",flexDirection:"column"}}>
          <div style={{padding:"7px 14px",borderBottom:`1px solid ${KBDR}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
            <div style={{fontSize:12,color:GRNT,fontWeight:"bold"}}>✅ Wat ging goed?</div>
            {gs.length>0&&<span style={{fontSize:11,color:GRNT}}>{gs.length}×</span>}
          </div>
          <div style={{flex:1,overflowY:"auto"}}>
            <OpmGrid lijst={GOED} prefix="P__" kleur={GRNT} geselecteerd={sel} toggle={toggle}/>
          </div>
          <div style={{padding:"10px 14px",display:"flex",gap:8,flexShrink:0}}>
            <button style={{flex:1,padding:15,background:`linear-gradient(135deg,${GRNT},${"#66bb6a"})`,border:"none",borderRadius:12,color:WIT,fontSize:15,fontWeight:"bold",cursor:"pointer",fontFamily:"inherit"}}
              onClick={noteer}>✓ Beurt opslaan</button>
            <button style={{padding:"15px 12px",background:"none",border:`1px solid ${KBDR}`,borderRadius:12,color:WITD,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}
              onClick={()=>setFase("gemist")}>←</button>
          </div>
        </div>
      );
    }
    return null;
  }

  // ── STATS ──
  function Stats(){
    const allB=alleP.flatMap(p=>p.beurten);
    const stA=stat(allB);
    const stLopend=stat(lp);
    return(
      <div style={{overflowY:"auto",padding:"12px 14px",height:"100%"}}>
        {stLopend&&(
          <div style={{background:KBG,border:`2px solid ${GOUD}`,borderRadius:10,padding:"12px 14px",marginBottom:12}}>
            <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:2,color:GOUD,marginBottom:8}}>⏳ Lopende partij</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:8}}>
              {[["Car.",stLopend.totCar],["Max",stLopend.max],["Gem",stLopend.gemPerBeurt],["Beurten",stLopend.aantalBeurten],["Poedels",stLopend.poedels],["Punten",stLopend.totPunten]].map(([l,v])=>(
                <div key={l} style={{textAlign:"center",background:"#1a3019",borderRadius:8,padding:"8px 4px"}}>
                  <div style={{fontSize:22,fontWeight:"bold",color:GOUD}}>{v}</div>
                  <div style={{fontSize:10,color:WITD}}>{l}</div>
                </div>
              ))}
            </div>
            <div style={{fontSize:11,color:GRNT,marginBottom:8}}>🎯 {stLopend.opbouw5}/{stLopend.aantalBeurten} ≥5 · {stLopend.opbouw57}× 5-7 · {stLopend.opbouw89}× 8-9 · {stLopend.opbouw10}× 10+</div>
            <Grafiek beurten={lp}/>
          </div>
        )}
        {stA&&(
          <div style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"12px 14px",marginBottom:12}}>
            <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:2,color:GOUD,marginBottom:8}}>Alle {alleP.length} partijen</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:8}}>
              {[["Car.",stA.totCar],["Max",stA.max],["Gem",stA.gemPerBeurt],["Beurten",stA.aantalBeurten],["Poedels",stA.poedels],["Punten",stA.totPunten]].map(([l,v])=>(
                <div key={l} style={{textAlign:"center",background:"#1a3019",borderRadius:8,padding:"8px 4px"}}>
                  <div style={{fontSize:22,fontWeight:"bold",color:GOUD}}>{v}</div>
                  <div style={{fontSize:10,color:WITD}}>{l}</div>
                </div>
              ))}
            </div>
            <div style={{fontSize:11,color:GRNT}}>🎯 Opbouw: {stA.opbouw5}/{stA.aantalBeurten} beurten ≥5</div>
          </div>
        )}
        <div style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"12px 14px",marginBottom:12}}>
          <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:2,color:GOUD,marginBottom:8}}>Per partij</div>
          {[...alleP].reverse().map((p,i)=>{
            const st=stat(p.beurten);
            return st?(
              <div key={p.id} style={{borderBottom:`1px solid ${KBDR}`,padding:"7px 0",fontSize:12}}>
                <div style={{color:GOUD}}>{new Date(p.datum).toLocaleDateString("nl-NL",{weekday:"short",day:"numeric",month:"short"})} · p{alleP.length-i}</div>
                <div style={{color:WITD,marginTop:1}}>{st.aantalBeurten}b · max {st.max} · gem {st.gemPerBeurt} · {st.poedels}x 🥚 · {st.totPunten}pt · <span style={{color:GRNT}}>🎯{st.opbouw5}×</span></div>
              </div>
            ):null;
          })}
        </div>
        {!confReset
          ?<button style={{width:"100%",padding:10,background:"none",border:"1px solid #7a3030",borderRadius:8,color:"#e06060",cursor:"pointer",fontSize:12,fontFamily:"inherit"}} onClick={()=>setConfReset(true)}>🗑 Alle data wissen</button>
          :<div style={{background:"#2a1515",border:"1px solid #7a3030",borderRadius:8,padding:"12px 14px"}}>
            <div style={{fontSize:12,color:"#e06060",marginBottom:10}}>Weet je het zeker?</div>
            <div style={{display:"flex",gap:8}}>
              <button style={{flex:1,padding:10,background:"#7a3030",border:"none",borderRadius:6,color:WIT,cursor:"pointer",fontFamily:"inherit",fontSize:12}} onClick={resetAlles}>Ja, wis alles</button>
              <button style={{flex:1,padding:10,background:"none",border:`1px solid ${KBDR}`,borderRadius:6,color:WITD,cursor:"pointer",fontFamily:"inherit",fontSize:12}} onClick={()=>setConfReset(false)}>Annuleer</button>
            </div>
          </div>}
      </div>
    );
  }

  // ── DATA ──
  function Data(){
    return(
      <div style={{overflowY:"auto",padding:"12px 14px",height:"100%"}}>
        <div style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"12px 14px",marginBottom:12}}>
          <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:2,color:GOUD,marginBottom:10}}>🤖 AI Analyse</div>
          <div style={{display:"flex",gap:8,marginBottom:aiRes?12:0}}>
            <button style={{flex:1,padding:12,background:"none",border:`1px solid ${GOUD}`,borderRadius:8,color:GOUD,fontSize:13,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>vraagAI("partij")} disabled={aiBezig}>{aiBezig&&aiType==="partij"?"⏳":"🎯"} Partij</button>
            <button style={{flex:1,padding:12,background:"none",border:`1px solid ${GOUD}`,borderRadius:8,color:GOUD,fontSize:13,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>vraagAI("trend")} disabled={aiBezig}>{aiBezig&&aiType==="trend"?"⏳":"📈"} Trend</button>
          </div>
          {aiRes&&(<div style={{background:"#1a2e1a",border:`1px solid ${KBDR}`,borderRadius:8,padding:12,fontSize:12,color:WITD,lineHeight:1.7,whiteSpace:"pre-wrap"}}>
            {aiRes}
            <button style={{display:"block",marginTop:8,background:"none",border:`1px solid ${KBDR}`,borderRadius:5,color:WITD,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>kopieer(aiRes,"ai")}>{gekopieerd==="ai"?"✓":"📋"} Kopieer</button>
          </div>)}
        </div>
        <button style={{width:"100%",padding:14,background:`linear-gradient(135deg,${GOUD},${GOUDL})`,border:"none",borderRadius:10,color:G,fontSize:15,fontWeight:"bold",cursor:"pointer",fontFamily:"inherit"}} onClick={()=>kopieer(bouwTekst(),"data")}>{gekopieerd==="data"?"✓ Gekopieerd!":"📋 Kopieer ruwe data"}</button>
      </div>
    );
  }

  // ── LOG ──
  function Log(){
    return(
      <div style={{overflowY:"auto",padding:"12px 14px",height:"100%"}}>
        {lp.length>0&&(
          <div style={{background:KBG,border:`2px solid ${GOUD}`,borderRadius:10,padding:"12px 14px",marginBottom:12}}>
            <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:2,color:GOUD,marginBottom:8}}>⏳ Lopende partij</div>
            {[...lp].reverse().map((b,i)=><LogRij key={b.id} b={b} nr={lp.length-i}/>)}
          </div>
        )}
        {[...alleP].reverse().map((p,pi)=>(
          <div key={p.id} style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"12px 14px",marginBottom:12}}>
            <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:2,color:GOUD,marginBottom:8}}>
              p{alleP.length-pi} · {new Date(p.datum).toLocaleDateString("nl-NL",{weekday:"long",day:"numeric",month:"long"})}
            </div>
            {[...p.beurten].reverse().map((b,i)=><LogRij key={b.id} b={b} nr={p.beurten.length-i}/>)}
          </div>
        ))}
      </div>
    );
  }

  return(
    <div className="app">
      <div style={{background:"linear-gradient(135deg,#0d1f0d,#1a2e1a)",borderBottom:`2px solid ${GOUD}`,padding:"9px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:26,color:GOUD}}>◎</span>
          <div>
            <div style={{fontSize:16,fontWeight:"bold",color:GOUD,letterSpacing:1}}>Biljart Tracker</div>
            <div style={{fontSize:9,color:WITD,letterSpacing:2,textTransform:"uppercase"}}>Carambole · Serie registratie</div>
          </div>
        </div>
        {fase!=="setup"&&lp.length>0&&(
          <button style={{background:"none",border:`1px solid ${KBDR}`,borderRadius:8,color:WITD,padding:"5px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>setConfPartij(true)}>🏁 Afsluiten</button>
        )}
      </div>

      {confPartij&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}}>
          <div style={{background:"#1a2e1a",border:`2px solid ${GOUD}`,borderRadius:14,padding:24,maxWidth:320,width:"100%"}}>
            <div style={{fontSize:15,color:WIT,marginBottom:6,textAlign:"center"}}>Partij opslaan?</div>
            <div style={{fontSize:12,color:WITD,marginBottom:18,textAlign:"center"}}>{lp.length} beurten · {totCarLp} car{stL?` · gem ${stL.gemPerBeurt}`:""}</div>
            <div style={{display:"flex",gap:10}}>
              <button style={{flex:1,padding:14,background:GRNT,border:"none",borderRadius:8,color:WIT,cursor:"pointer",fontFamily:"inherit",fontSize:14}} onClick={sluit}>✓ Opslaan</button>
              <button style={{flex:1,padding:14,background:"none",border:`1px solid ${KBDR}`,borderRadius:8,color:WITD,cursor:"pointer",fontFamily:"inherit",fontSize:14}} onClick={()=>setConfPartij(false)}>Annuleer</button>
            </div>
          </div>
        </div>
      )}

      <div style={{display:"flex",borderBottom:`1px solid ${KBDR}`,background:"#152015",flexShrink:0}}>
        {[["spelen","⚪ Spelen"],["stats","📊 Stats"],["data","🗂 Data"],["log","📋 Log"]].map(([k,l])=>(
          <button key={k} style={{flex:1,padding:"11px 0",background:tab===k?"#1c2c1c":"none",border:"none",color:tab===k?GOUD:WITD,fontSize:12,cursor:"pointer",fontFamily:"inherit",borderBottom:tab===k?`2px solid ${GOUD}`:"2px solid transparent"}} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>

      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {tab==="spelen"&&<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}><Spelen/></div>}
        {tab==="stats"&&<Stats/>}
        {tab==="data"&&<Data/>}
        {tab==="log"&&<Log/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<BiljartTracker/>);
</script>
</body>
</html>
