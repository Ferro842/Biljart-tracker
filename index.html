  const opbouw5=beurten.filter(b=>b.caramboles>=5).length;
  const opbouw57=beurten.filter(b=>b.caramboles>=5&&b.caramboles<=7).length;
  const opbouw89=beurten.filter(b=>b.caramboles>=8&&b.caramboles<=9).length;
  const opbouw10=beurten.filter(b=>b.caramboles>=10).length;
  return{totCar,max:mx,totPunten,aantalBeurten:beurten.length,poedels,gemPerBeurt,opbouw5,opbouw57,opbouw89,opbouw10};
}

// Berekent chronologisch (oud->nieuw) welke prestatie-badges elke partij heeft verdiend.
// "Record"-achtige badges vergelijken tegen de staat VOOR die partij, niet achteraf.
// Retourneert een array in dezelfde volgorde als partijen: [{id,badges:[{label,emoji,aantal,punten}],punten}]
function berekenPrestaties(partijen){
  let allTimeMaxBeurt=0;
  let allTimeBestGem=0;
  const tafelBest={};
  let cumCar=0,cumBeurt=0;
  const rollingHistory=[];
  const resultaten=[];

  (partijen||[]).forEach(function(p){
    const st=stat(p.beurten);
    if(!st){resultaten.push({id:p.id,badges:[],punten:0});return;}
    const gem=parseFloat(st.gemPerBeurt);
    const badges=[];

    if(st.opbouw57>0){
      const waarden=p.beurten.filter(function(b){return b.caramboles>=5&&b.caramboles<=7;}).map(function(b){return b.caramboles;});
      badges.push({label:"Opbouw",emoji:"🎯",aantal:st.opbouw57,punten:st.opbouw57*10,categorie:"Beurt-pieken",detail:"Beurten van "+waarden.join(", ")+" car (drempel: 5-7 car per beurt)"});
    }
    if(st.opbouw89>0){
      const waarden=p.beurten.filter(function(b){return b.caramboles>=8&&b.caramboles<=9;}).map(function(b){return b.caramboles;});
      badges.push({label:"Sterke serie",emoji:"🔥",aantal:st.opbouw89,punten:st.opbouw89*20,categorie:"Beurt-pieken",detail:"Beurten van "+waarden.join(", ")+" car (drempel: 8-9 car per beurt)"});
    }
    if(st.opbouw10>0){
      const waarden=p.beurten.filter(function(b){return b.caramboles>=10;}).map(function(b){return b.caramboles;});
      badges.push({label:"Topserie",emoji:"💫",aantal:st.opbouw10,punten:st.opbouw10*35,categorie:"Beurt-pieken",detail:"Beurten van "+waarden.join(", ")+" car (drempel: 10+ car per beurt)"});
    }

    if(st.max>allTimeMaxBeurt&&allTimeMaxBeurt>0){
      badges.push({label:"Nieuw record beurt",emoji:"🏆",aantal:1,punten:50,categorie:"Beurt-pieken",detail:"Nieuwe hoogste beurt: "+st.max+" car (vorig record: "+allTimeMaxBeurt+" car)"});
    }

    let langsteReeks=0,huidigeReeks=0;
    p.beurten.forEach(function(b){
      if(b.caramboles>0){huidigeReeks++;langsteReeks=Math.max(langsteReeks,huidigeReeks);}
      else huidigeReeks=0;
    });
    if(st.poedels===0){
      badges.push({label:"Geen poedel hele partij",emoji:"🛡️",aantal:1,punten:30,categorie:"Consistentie",detail:"0 van de "+st.aantalBeurten+" beurten was een poedel"});
    }else if(langsteReeks>=8){
      badges.push({label:"Lange reeks zonder poedel",emoji:"⛓️",aantal:1,punten:25,categorie:"Consistentie",detail:"Langste reeks: "+langsteReeks+" beurten op rij zonder poedel (drempel: 8+)"});
    }else if(langsteReeks>=5){
      badges.push({label:"Reeks zonder poedel",emoji:"⛓️",aantal:1,punten:15,categorie:"Consistentie",detail:"Langste reeks: "+langsteReeks+" beurten op rij zonder poedel (drempel: 5+)"});
    }
    const poedelPct=st.poedels/st.aantalBeurten*100;
    if(poedelPct<20&&st.poedels>0){
      badges.push({label:"Weinig poedels",emoji:"✅",aantal:1,punten:15,categorie:"Consistentie",detail:st.poedels+" van de "+st.aantalBeurten+" beurten poedel ("+Math.round(poedelPct)+"%, drempel: <20%)"});
    }

    const herstelDetails=[];
    p.beurten.forEach(function(b,i){
      if(b.caramboles===0){
        const next=p.beurten[i+1];
        if(next&&next.caramboles>=5)herstelDetails.push("na poedel volgde "+next.caramboles+" car");
      }
    });
    if(herstelDetails.length>0)badges.push({label:"Sterk herstel na poedel",emoji:"💪",aantal:herstelDetails.length,punten:herstelDetails.length*15,categorie:"Mentaliteit",detail:herstelDetails.join(" · ")+" (drempel: 5+ car direct na een poedel)"});

    const helft=Math.floor(p.beurten.length/2);
    if(helft>=3){
      const eerste=p.beurten.slice(0,helft),tweede=p.beurten.slice(helft);
      const gemE=eerste.reduce(function(a,b){return a+b.caramboles;},0)/eerste.length;
      const gemT=tweede.reduce(function(a,b){return a+b.caramboles;},0)/tweede.length;
      if(gemT>gemE)badges.push({label:"Sterke afsluiting",emoji:"📈",aantal:1,punten:15,categorie:"Mentaliteit",detail:"1e helft: "+gemE.toFixed(2)+" gem · 2e helft: "+gemT.toFixed(2)+" gem"});
    }

    if(p.doel&&p.doelType){
      const behaaldeWaarde=p.doelType==="beurten"?p.beurten.length:st.totCar;
      const bereikt=behaaldeWaarde>=p.doel;
      if(bereikt)badges.push({label:"Partijdoel gehaald",emoji:"🎯",aantal:1,punten:20,categorie:"Doel & totaal",detail:"Doel: "+p.doel+" "+(p.doelType==="beurten"?"beurten":"caramboles")+" · behaald: "+behaaldeWaarde});
    }

    if(gem>=2.5){
      badges.push({label:"Gemiddelde boven 2,5",emoji:"⭐",aantal:1,punten:30,categorie:"Doel & totaal",detail:"Partijgemiddelde: "+gem.toFixed(2)+" (drempel: 2,5)"});
    }else if(gem>=2.0){
      badges.push({label:"Gemiddelde boven 2,0",emoji:"⭐",aantal:1,punten:15,categorie:"Doel & totaal",detail:"Partijgemiddelde: "+gem.toFixed(2)+" (drempel: 2,0)"});
    }

    if(gem>allTimeBestGem&&allTimeBestGem>0){
      badges.push({label:"Nieuw beste gemiddelde ooit",emoji:"👑",aantal:1,punten:60,categorie:"Doel & totaal",detail:"Nieuw record: "+gem.toFixed(2)+" (vorig record: "+allTimeBestGem.toFixed(2)+")"});
    }

    const tafelKey=p.tafel||"230";
    if(gem>(tafelBest[tafelKey]||0)&&tafelBest[tafelKey]){
      badges.push({label:"Beste partij ooit op deze tafel",emoji:"🏓",aantal:1,punten:40,categorie:"Tafel-specifiek",detail:"Nieuw record op "+(tafelKey==="210"?"2,10":"2,30")+"-tafel: "+gem.toFixed(2)+" (vorig: "+tafelBest[tafelKey].toFixed(2)+")"});
    }

    if(cumBeurt>0){
      const totaalGemTotDan=cumCar/cumBeurt;
      if(gem>totaalGemTotDan)badges.push({label:"Beter dan je totaalgemiddelde",emoji:"📊",aantal:1,punten:10,categorie:"Vergelijking",detail:"Deze partij: "+gem.toFixed(2)+" vs totaalgemiddelde tot dan: "+totaalGemTotDan.toFixed(2)});
    }
    if(rollingHistory.length>=5){
      const laatste5=rollingHistory.slice(-5);
      const rC=laatste5.reduce(function(a,r){return a+r.tot;},0),rN=laatste5.reduce(function(a,r){return a+r.n;},0);
      const rollingGem=rC/rN;
      if(gem>rollingGem)badges.push({label:"Beter dan je 5-partij rolling gemiddelde",emoji:"📉",aantal:1,punten:15,categorie:"Vergelijking",detail:"Deze partij: "+gem.toFixed(2)+" vs 5-partij rolling: "+rollingGem.toFixed(2)});
    }

    const totaalPunten=badges.reduce(function(a,b){return a+b.punten;},0);
    resultaten.push({id:p.id,badges:badges,punten:totaalPunten});

    allTimeMaxBeurt=Math.max(allTimeMaxBeurt,st.max);
    allTimeBestGem=Math.max(allTimeBestGem,gem);
    tafelBest[tafelKey]=Math.max(tafelBest[tafelKey]||0,gem);
    cumCar+=st.totCar;cumBeurt+=st.aantalBeurten;
    rollingHistory.push({tot:st.totCar,n:st.aantalBeurten});
  });

  return resultaten;
}

// Vult tafelmaat aan voor partijen die dit veld nog niet hebben (oude data van vóór deze functie).
// Regel: 25 beurten -> 2,10-tafel, alle overige -> 2,30-tafel.
// Correctie: de partij met 40 beurten was ook op de 2,10-tafel.
function migreerTafels(d){
  let changed=false;
  (d.partijen||[]).forEach(function(p){
    if(!p.tafel){
      p.tafel=(p.beurten&&p.beurten.length===25)?"210":"230";
      changed=true;
    }
    if(p.beurten&&p.beurten.length===40&&p.tafel!=="210"){
      p.tafel="210";
      changed=true;
    }
  });
  return changed;
}

async function laadData(){
  // Eerst localStorage - nooit overschrijven met HD fallback als data bestaat
  try{
    const s=localStorage.getItem(SK);
    if(s){
      const d=JSON.parse(s);
      if(d&&d.partijen&&d.partijen.length>0){
        console.log("Geladen uit localStorage: "+d.partijen.length+" partijen");
        if(migreerTafels(d))await slaOp(d);
        return d;
      }
    }
  }catch(e){console.log("localStorage fout:",e);}
  // Dan window.storage (Claude app)
  try{
    if(window.storage){
      const r=await window.storage.get(SK);
      if(r){
        const d=JSON.parse(r.value);
        if(d&&d.partijen&&d.partijen.length>0){
          console.log("Geladen uit window.storage: "+d.partijen.length+" partijen");
          if(migreerTafels(d))await slaOp(d);
          return d;
        }
      }
    }
  }catch(e){console.log("window.storage fout:",e);}
  // Alleen HD fallback als er ECHT geen data is
  console.log("Geen opgeslagen data gevonden, gebruik HD fallback");
  return{huidigeId:900,partijen:mkPartijen()};
}
async function slaOp(d){
  try{localStorage.setItem(SK,JSON.stringify(d));}catch(e){console.log("Opslaan mislukt:",e);}
  try{if(window.storage)await window.storage.set(SK,JSON.stringify(d));}catch(e){}
}

function Grafiek({beurten}){
  if(!beurten||beurten.length<2)return null;
  const vals=beurten.map(b=>b.caramboles);
  const maxV=Math.max(...vals,1);
  const ppp=Math.max(6,Math.min(18,300/vals.length));
  const lp=8,tp=16,H=36;
  const W=lp+ppp*(vals.length-1);
  const ps=vals.map((v,i)=>(lp+i*ppp)+","+(tp+H-(v/maxV)*H)).join(" ");
  const fs=vals.length>20?7:vals.length>12?8:9;
  return(
    <div style={{overflowX:"auto"}}>
      <svg width={Math.max(W,40)} height={H+tp+6} style={{overflow:"visible",display:"block"}}>
        <polyline points={ps} fill="none" stroke={GOUD} strokeWidth="1.5" strokeLinejoin="round"/>
        {vals.map(function(v,i){
          const cx=lp+i*ppp,cy=tp+H-(v/maxV)*H;
          const k=v>=10?"#ff9f40":v>=8?"#e8c96a":v>=5?GRNT:GOUD;
          return React.createElement("g",{key:i},
            React.createElement("circle",{cx:cx,cy:cy,r:v>=5?3:2,fill:k}),
            React.createElement("text",{x:cx,y:cy-5,textAnchor:"middle",fontSize:fs,fill:k,fontFamily:"Georgia,serif",fontWeight:v>=5?"bold":"normal"},v)
          );
        })}
      </svg>
    </div>
  );
}

function DashGrafiek({data,h=70}){
  if(!data||data.length<2)return null;
  const vals=data.filter(v=>v!==null);
  if(vals.length<1)return null;
  const max=Math.max(...vals,0.1);
  const W=data.length*16;
  // Bouw meerdere polyline segmenten zodat nulls een "gat" geven
  const segmenten=[];
  let huidig=[];
  data.forEach((v,i)=>{
    if(v!==null){
      huidig.push(`${i*16+8},${h-(v/max)*(h-8)+4}`);
    } else {
      if(huidig.length>1)segmenten.push(huidig.join(" "));
      huidig=[];
    }
  });
  if(huidig.length>1)segmenten.push(huidig.join(" "));
  return(
    <div style={{overflowX:"auto"}}>
      <svg width={W} height={h+8} style={{display:"block"}}>
        {[1,2,3].map(v=>(
          <line key={v} x1={0} y1={h-(v/max)*(h-8)+4} x2={W} y2={h-(v/max)*(h-8)+4}
            stroke={KBDR} strokeWidth="0.5" strokeDasharray="3,3"/>
        ))}
        {segmenten.map((pts,i)=>(
          <polyline key={i} points={pts} fill="none" stroke="#2d4a22" strokeWidth="1.5" strokeLinejoin="round"/>
        ))}
        {data.map((v,i)=>{
          if(v===null)return null;
          const cx=i*16+8, cy=h-(v/max)*(h-8)+4;
          const k=v>=2.5?GRNT:v>=2?GOUD:v>=1.5?WITD:ROOD;
          return <g key={i}>
            <circle cx={cx} cy={cy} r={3} fill={k}/>
            <text x={cx} y={cy-6} textAnchor="middle" fontSize="8" fill={k} fontFamily="Georgia">{v}</text>
          </g>;
        })}
      </svg>
    </div>
  );
}

function maandKey(iso){
  const MND=["jan","feb","mrt","apr","mei","jun","jul","aug","sep","okt","nov","dec"];
  const d=new Date(iso);
  return MND[d.getMonth()]+" "+d.getFullYear();
}
function fmtDatum(iso){
  return new Date(iso).toLocaleDateString("nl-NL",{day:"numeric",month:"short"});
}

function Dashboard({partijen}){
  // ST wordt live afgeleid van de echte partijen (inclusief nieuwe partijen en comments)
  const ST=useMemo(()=>{
    return (partijen||[]).map(function(p){
      const st=stat(p.beurten);
      if(!st)return null;
      return{id:p.id,datum:p.datum,tafel:p.tafel||"230",tot:st.totCar,n:st.aantalBeurten,max:st.max,poedels:st.poedels,opbouw:st.opbouw5,gem:parseFloat(st.gemPerBeurt),beurten:p.beurten};
    }).filter(Boolean);
  },[partijen]);

  const [va,setVa]=useState(0);
  const [tot,setTot]=useState(Math.max(ST.length-1,0));
  const [w3,setW3]=useState(true);
  const [w5,setW5]=useState(true);
  const [trimL,setTrimL]=useState(0);
  const [trimH,setTrimH]=useState(0);
  const [tab,setTab]=useState("trend");
  const [tafelFilter,setTafelFilter]=useState("alle");

  const selRange=useMemo(()=>ST.slice(va,tot+1),[ST,va,tot]);
  const sel=useMemo(()=>tafelFilter==="alle"?selRange:selRange.filter(p=>p.tafel===tafelFilter),[selRange,tafelFilter]);

  const maxTrim=Math.max(0,Math.floor((sel.length-1)/2));
  const trimLClamped=Math.min(trimL,maxTrim);
  const trimHClamped=Math.min(trimH,maxTrim);

  const filt=useMemo(()=>{
    const s=[...sel].sort((a,b)=>a.gem-b.gem);
    const ids=new Set(s.slice(trimLClamped,s.length-trimHClamped).map(p=>p.id));
    return sel.filter(p=>ids.has(p.id));
  },[sel,trimLClamped,trimHClamped]);

  const filtTot=filt.reduce((a,p)=>a+p.tot,0);
  const filtN=filt.reduce((a,p)=>a+p.n,0);
  const gemGem=filtN>0?(filtTot/filtN).toFixed(2):"—";
  const b15=Math.round(filt.filter(p=>p.gem>=1.5).length/Math.max(filt.length,1)*100);
  const b20=Math.round(filt.filter(p=>p.gem>=2.0).length/Math.max(filt.length,1)*100);
  const b25=Math.round(filt.filter(p=>p.gem>=2.5).length/Math.max(filt.length,1)*100);
  const b30=Math.round(filt.filter(p=>p.gem>=3.0).length/Math.max(filt.length,1)*100);

  // rolGems: behoudt originele volgorde van sel, null voor weggefilterde partijen (voor de puntjes-grafiek, per partij)
  const filtIds=useMemo(()=>new Set(filt.map(p=>p.id)),[filt]);
  const rolGems=sel.map(p=>filtIds.has(p.id)?p.gem:null);
  // rolData: tot/n per partij, voor beurt-gewogen rolling gemiddeldes
  const rolData=sel.map(p=>filtIds.has(p.id)?{tot:p.tot,n:p.n}:null);
  const r3=rolData.map((_,i)=>{
    const slice=rolData.slice(Math.max(0,i-2),i+1).filter(v=>v!==null);
    if(slice.length<3)return null;
    const sTot=slice.reduce((a,v)=>a+v.tot,0),sN=slice.reduce((a,v)=>a+v.n,0);
    return parseFloat((sTot/sN).toFixed(2));
  });
  const r5=rolData.map((_,i)=>{
    const slice=rolData.slice(Math.max(0,i-4),i+1).filter(v=>v!==null);
    if(slice.length<5)return null;
    const sTot=slice.reduce((a,v)=>a+v.tot,0),sN=slice.reduce((a,v)=>a+v.n,0);
    return parseFloat((sTot/sN).toFixed(2));
  });

  // Maand-blokken voor de snelfilters, dynamisch afgeleid van de echte data
  const maandBlokken=useMemo(()=>{
    const blocks=[];
    ST.forEach((p,i)=>{
      const key=maandKey(p.datum);
      const last=blocks[blocks.length-1];
      if(last&&last.key===key){last.eind=i;}
      else blocks.push({key,begin:i,eind:i});
    });
    return blocks;
  },[ST]);
  const quickButtons=useMemo(()=>{
    const btns=[["Alles",0,Math.max(ST.length-1,0)]];
    maandBlokken.forEach(b=>btns.push([b.key,b.begin,b.eind]));
    if(ST.length>10)btns.push(["Laatste 10",ST.length-10,ST.length-1]);
    return btns;
  },[ST.length,maandBlokken]);

  // Vergelijking eerste vs tweede helft
  const h=Math.floor(sel.length/2);
  const h1=sel.slice(0,h), h2=sel.slice(h);
  const g1=h1.length?((h1.reduce((a,p)=>a+p.tot,0))/(h1.reduce((a,p)=>a+p.n,0))).toFixed(2):"—";
  const g2=h2.length?((h2.reduce((a,p)=>a+p.tot,0))/(h2.reduce((a,p)=>a+p.n,0))).toFixed(2):"—";

  // Per maand
  const maandGroepen=useMemo(()=>{
    const groups={};
    sel.forEach(p=>{
      const k=maandKey(p.datum);
      if(!groups[k])groups[k]=[];
      groups[k].push(p);
    });
    return Object.entries(groups);
  },[sel]);

  // ── PUNTEN: prestatie-badges, chronologisch berekend over de volledige geschiedenis ──
  const prestatiesMap=useMemo(()=>{
    const m={};
    berekenPrestaties(partijen).forEach(r=>{m[r.id]=r;});
    return m;
  },[partijen]);
  const puntenSel=useMemo(()=>sel.map(p=>Object.assign({},p,prestatiesMap[p.id]||{badges:[],punten:0})),[sel,prestatiesMap]);
  const totaalPuntenSel=puntenSel.reduce((a,p)=>a+p.punten,0);
  const gemPuntenSel=puntenSel.length?Math.round(totaalPuntenSel/puntenSel.length):0;
  const top5Punten=useMemo(()=>[...puntenSel].sort((a,b)=>b.punten-a.punten).slice(0,5),[puntenSel]);
  const badgeFrequentie=useMemo(()=>{
    const freq={};
    puntenSel.forEach(p=>{
      (p.badges||[]).forEach(b=>{
        if(!freq[b.label])freq[b.label]={emoji:b.emoji,aantal:0,punten:0};
        freq[b.label].aantal+=b.aantal;
        freq[b.label].punten+=b.punten;
      });
    });
    return Object.entries(freq).sort((a,b)=>b[1].punten-a[1].punten);
  },[puntenSel]);

  // ── PATRONEN: tag-analyse, verdeling per beurt, poedel-herstel ──
  const gemistCounts=useMemo(()=>{
    const c={};
    sel.forEach(p=>p.beurten.forEach(b=>(b.gemist||[]).forEach(t=>{c[t]=(c[t]||0)+1;})));
    return Object.entries(c).sort((a,b)=>b[1]-a[1]);
  },[sel]);
  const goedCounts=useMemo(()=>{
    const c={};
    sel.forEach(p=>p.beurten.forEach(b=>(b.goed||[]).forEach(t=>{c[t]=(c[t]||0)+1;})));
    return Object.entries(c).sort((a,b)=>b[1]-a[1]);
  },[sel]);

  const histData=useMemo(()=>{
    const buckets=[["0 (poedel)",0,0],["1-2",1,2],["3-4",3,4],["5-7",5,7],["8-9",8,9],["10+",10,Infinity]];
    const allCar=sel.flatMap(p=>p.beurten.map(b=>b.caramboles));
    const counts=buckets.map(([label,lo,hi])=>({label,n:allCar.filter(c=>c>=lo&&c<=hi).length}));
    return{counts,totBeurt:allCar.length};
  },[sel]);

  const poedelHerstel=useMemo(()=>{
    let tilt=0,klein=0,sterk=0,totaalPoedels=0,geenVolgende=0;
    sel.forEach(p=>{
      const bs=p.beurten;
      bs.forEach((b,i)=>{
        if(b.caramboles===0){
          totaalPoedels++;
          const next=bs[i+1];
          if(!next){geenVolgende++;return;}
          if(next.caramboles===0)tilt++;
          else if(next.caramboles>=5)sterk++;
          else klein++;
        }
      });
    });
    return{tilt,klein,sterk,totaalPoedels,basis:totaalPoedels-geenVolgende};
  },[sel]);

  const kaart=(label,waarde,sub,kleur=GOUD)=>(
    <div style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
      <div style={{fontSize:9,color:WITD,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>{label}</div>
      <div style={{fontSize:26,fontWeight:"bold",color:kleur,lineHeight:1}}>{waarde}</div>
      {sub&&<div style={{fontSize:9,color:WITD,marginTop:3}}>{sub}</div>}
    </div>
  );

  const btn=(k,l)=>(
    <button onClick={()=>setTab(k)} style={{flex:1,padding:"10px 0",background:tab===k?"#1c2c1c":"none",
      border:"none",color:tab===k?GOUD:WITD,fontSize:11,cursor:"pointer",fontFamily:"Georgia,serif",
      borderBottom:tab===k?`2px solid ${GOUD}`:"2px solid transparent"}}>
      {l}
    </button>
  );

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:G,fontFamily:"Georgia,serif",color:WIT}}>

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#0d1f0d,#182e14)",borderBottom:`2px solid ${GOUD}`,padding:"10px 14px",flexShrink:0}}>
        <div style={{fontSize:15,fontWeight:"bold",color:GOUD,letterSpacing:1}}>Biljart Dashboard</div>
        <div style={{fontSize:9,color:WITD,letterSpacing:2,textTransform:"uppercase"}}>Ferro · Analyse & trends · {ST.length} partijen</div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",borderBottom:`1px solid ${KBDR}`,background:"#152015",flexShrink:0}}>
        {btn("trend","Trend")}
        {btn("consist","Consistentie")}
        {btn("patronen","Patronen")}
        {btn("vergelijk","Vergelijk")}
        {btn("punten","Punten")}
      </div>

      {/* Partijselectie */}
      <div style={{background:"#152015",padding:"8px 14px",borderBottom:`1px solid ${KBDR}`,flexShrink:0}}>
        <div style={{fontSize:9,color:WITD,marginBottom:5}}>
          Selectie: p{va+1}–p{tot+1} · <span style={{color:GOUD}}>{filt.length} partijen</span>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
          <span style={{fontSize:9,color:WITD,minWidth:14}}>{va+1}</span>
          <input type="range" min={0} max={Math.max(ST.length-1,0)} value={va}
            onChange={e=>setVa(Math.min(+e.target.value,tot-1))}
            style={{flex:1,accentColor:GOUD}}/>
          <input type="range" min={0} max={Math.max(ST.length-1,0)} value={tot}
            onChange={e=>setTot(Math.max(+e.target.value,va+1))}
            style={{flex:1,accentColor:GOUD}}/>
          <span style={{fontSize:9,color:WITD,minWidth:14}}>{tot+1}</span>
        </div>
        <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:2}}>
          {quickButtons.map(([l,v,t])=>{
            const actief=va===v&&tot===t;
            return(
              <button key={l} onClick={()=>{setVa(v);setTot(t);}}
                style={{flex:"0 0 auto",padding:"4px 10px",background:actief?"#2d4a1e":"none",border:`1px solid ${actief?GOUD:KBDR}`,
                  borderRadius:5,color:actief?GOUD:WITD,fontSize:9,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>
                {l}
              </button>
            );
          })}
        </div>
        <div style={{display:"flex",gap:5,marginTop:6}}>
          {[["alle","Alle tafels"],["210","2,10"],["230","2,30"]].map(([k,l])=>(
            <button key={k} onClick={()=>setTafelFilter(k)}
              style={{flex:1,padding:"4px 0",background:tafelFilter===k?"#2d4a1e":"none",border:`1px solid ${tafelFilter===k?GOUD:KBDR}`,
                borderRadius:5,color:tafelFilter===k?GOUD:WITD,fontSize:9,cursor:"pointer",fontFamily:"inherit"}}>
              {l}
            </button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",padding:"12px 14px"}}>

        {/* TREND */}
        {tab==="trend"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {kaart("Gem.",gemGem,"per beurt",parseFloat(gemGem)>=2.5?GRNT:parseFloat(gemGem)>=2?GOUD:ROOD)}
            {kaart("Max",filt.length?Math.max(...filt.map(p=>p.gem)):"—","partij",GOUDL)}
            {kaart("Opbouw",filt.length?Math.round(filt.reduce((a,p)=>a+p.opbouw,0)/filt.reduce((a,p)=>a+p.n,0)*100)+"%":"—","beurten ≥5",GRNT)}
          </div>

          <div style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"12px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontSize:11,color:GOUD,textTransform:"uppercase",letterSpacing:1}}>Rolling gemiddelde</span>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>setW3(!w3)} style={{background:"none",border:`1px solid ${w3?GOUD:KBDR}`,
                  borderRadius:4,color:w3?GOUD:WITD,fontSize:9,padding:"2px 8px",cursor:"pointer",fontFamily:"inherit"}}>3p</button>
                <button onClick={()=>setW5(!w5)} style={{background:"none",border:`1px solid ${w5?WIT:KBDR}`,
                  borderRadius:4,color:w5?WIT:WITD,fontSize:9,padding:"2px 8px",cursor:"pointer",fontFamily:"inherit"}}>5p</button>
              </div>
            </div>
            <div style={{fontSize:9,color:WITD,marginBottom:6,display:"flex",gap:12}}>
              <span style={{color:"#3a5c35"}}>● Ruw</span>
              {w3&&<span style={{color:GOUD}}>── 3-partij</span>}
              {w5&&<span style={{color:WIT}}>╌╌ 5-partij</span>}
            </div>
            <DashGrafiek data={rolGems}/>
            {(w3||w5)&&<div style={{marginTop:6,display:"flex",gap:12,fontSize:10}}>
              {w3&&<span style={{color:GOUD}}>3p nu: <strong>{r3.filter(v=>v!==null).slice(-1)[0]}</strong></span>}
              {w5&&<span style={{color:WIT}}>5p nu: <strong>{r5.filter(v=>v!==null).slice(-1)[0]}</strong></span>}
            </div>}
          </div>

          <div style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"12px"}}>
            <div style={{fontSize:11,color:GOUD,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Uitschieters weggooien</div>
            <div style={{display:"flex",gap:10,marginBottom:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:9,color:ROOD,marginBottom:4}}>Slechtste {trimLClamped} weg</div>
                <input type="range" min={0} max={maxTrim} step={1} value={trimLClamped}
                  onChange={e=>setTrimL(+e.target.value)} style={{width:"100%",accentColor:ROOD}}/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:9,color:GRNT,marginBottom:4}}>Beste {trimHClamped} weg</div>
                <input type="range" min={0} max={maxTrim} step={1} value={trimHClamped}
                  onChange={e=>setTrimH(+e.target.value)} style={{width:"100%",accentColor:GRNT}}/>
              </div>
            </div>
            <div style={{textAlign:"center",background:"#1a3019",borderRadius:8,padding:"8px"}}>
              <span style={{fontSize:11,color:WITD}}>Gefilterd gemiddelde: </span>
              <span style={{fontSize:20,fontWeight:"bold",color:parseFloat(gemGem)>=2?GOUD:WITD}}>{gemGem}</span>
            </div>
          </div>
        </div>}

        {/* CONSISTENTIE */}
        {tab==="consist"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"14px"}}>
            <div style={{fontSize:11,color:GOUD,textTransform:"uppercase",letterSpacing:1,marginBottom:14}}>% boven drempel</div>
            {[[1.5,b15,"#5a8a50"],[2.0,b20,GOUD],[2.5,b25,"#e8a84c"],[3.0,b30,ROOD]].map(([d,pct,k])=>(
              <div key={d} style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:12,color:WITD}}>Boven {d}</span>
                  <span style={{fontSize:18,fontWeight:"bold",color:k}}>{pct}%</span>
                </div>
                <DashBalk pct={pct} kleur={k}/>
                <div style={{fontSize:9,color:WITD,marginTop:2}}>
                  {filt.filter(p=>p.gem>=d).length} van {filt.length} partijen
                </div>
              </div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"12px"}}>
              <div style={{fontSize:10,color:GRNT,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Beste 5</div>
              {[...filt].sort((a,b)=>b.gem-a.gem).slice(0,5).map(p=>(
                <div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:`1px solid ${KBDR}`}}>
                  <span style={{fontSize:10,color:WITD}}>p{p.id} {fmtDatum(p.datum)}</span>
                  <span style={{fontSize:12,fontWeight:"bold",color:GRNT}}>{p.gem}</span>
                </div>
              ))}
            </div>
            <div style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"12px"}}>
              <div style={{fontSize:10,color:ROOD,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Slechtste 5</div>
              {[...filt].sort((a,b)=>a.gem-b.gem).slice(0,5).map(p=>(
                <div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:`1px solid ${KBDR}`}}>
                  <span style={{fontSize:10,color:WITD}}>p{p.id} {fmtDatum(p.datum)}</span>
                  <span style={{fontSize:12,fontWeight:"bold",color:ROOD}}>{p.gem}</span>
                </div>
              ))}
            </div>
          </div>
        </div>}

        {/* PATRONEN */}
        {tab==="patronen"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>

          <div style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"12px"}}>
            <div style={{fontSize:11,color:GOUD,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Meest genoteerde redenen</div>
            {gemistCounts.length===0&&goedCounts.length===0
              ?<div style={{fontSize:12,color:WITD}}>Nog geen opmerkingen genoteerd in deze selectie.</div>
              :<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div>
                  <div style={{fontSize:10,color:ROOD,marginBottom:6}}>Gemist door</div>
                  {gemistCounts.length===0?<div style={{fontSize:11,color:WITD}}>—</div>:gemistCounts.slice(0,8).map(([label,n])=>(
                    <div key={label} style={{marginBottom:6}}>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:WITD,marginBottom:2}}>
                        <span>{label}</span><span>{n}x</span>
                      </div>
                      <DashBalk pct={Math.round(n/gemistCounts[0][1]*100)} kleur={ROOD} hoogte={5}/>
                    </div>
                  ))}
                </div>
                <div>
                  <div style={{fontSize:10,color:GRNT,marginBottom:6}}>Ging goed door</div>
                  {goedCounts.length===0?<div style={{fontSize:11,color:WITD}}>—</div>:goedCounts.slice(0,8).map(([label,n])=>(
                    <div key={label} style={{marginBottom:6}}>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:WITD,marginBottom:2}}>
                        <span>{label}</span><span>{n}x</span>
                      </div>
                      <DashBalk pct={Math.round(n/goedCounts[0][1]*100)} kleur={GRNT} hoogte={5}/>
                    </div>
                  ))}
                </div>
              </div>
            }
          </div>

          <div style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"12px"}}>
            <div style={{fontSize:11,color:GOUD,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Verdeling caramboles per beurt</div>
            {histData.totBeurt===0
              ?<div style={{fontSize:12,color:WITD}}>Geen beurten in selectie.</div>
              :<>
                {histData.counts.map(({label,n})=>{
                  const pct=Math.round(n/histData.totBeurt*100);
                  const kleur=label==="0 (poedel)"?"#e08055":label==="10+"?"#ff9f40":label==="8-9"?GOUDL:label==="5-7"?GRNT:GOUD;
                  return(
                    <div key={label} style={{marginBottom:10}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                        <span style={{fontSize:12,color:WITD}}>{label}</span>
                        <span style={{fontSize:12,fontWeight:"bold",color:kleur}}>{n}x · {pct}%</span>
                      </div>
                      <DashBalk pct={pct} kleur={kleur}/>
                    </div>
                  );
                })}
                <div style={{fontSize:9,color:WITD,marginTop:2}}>{histData.totBeurt} beurten totaal</div>
              </>
            }
          </div>

          <div style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"12px"}}>
            <div style={{fontSize:11,color:GOUD,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Na een poedel</div>
            {poedelHerstel.basis===0
              ?<div style={{fontSize:12,color:WITD}}>Geen poedels met vervolgbeurt in selectie.</div>
              :<>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:10}}>
                  {kaart("Opnieuw poedel",Math.round(poedelHerstel.tilt/poedelHerstel.basis*100)+"%",poedelHerstel.tilt+"x",ROOD)}
                  {kaart("Klein herstel",Math.round(poedelHerstel.klein/poedelHerstel.basis*100)+"%",poedelHerstel.klein+"x",GOUD)}
                  {kaart("Sterk herstel",Math.round(poedelHerstel.sterk/poedelHerstel.basis*100)+"%",poedelHerstel.sterk+"x (5+)",GRNT)}
                </div>
                <div style={{fontSize:9,color:WITD}}>Gebaseerd op {poedelHerstel.basis} poedels ({poedelHerstel.totaalPoedels} totaal in selectie)</div>
              </>
            }
          </div>

        </div>}

        {/* VERGELIJK */}
        {tab==="vergelijk"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"12px"}}>
            <div style={{fontSize:11,color:GOUD,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Eerste vs tweede helft</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              {[[`p1–p${h}`,g1,h1],[`p${h+1}–p${sel.length}`,g2,h2]].map(([label,gem,ps])=>(
                <div key={label} style={{background:"#1a3019",borderRadius:8,padding:"12px",textAlign:"center"}}>
                  <div style={{fontSize:10,color:WITD,marginBottom:4}}>{label}</div>
                  <div style={{fontSize:28,fontWeight:"bold",color:parseFloat(gem)>=2.5?GRNT:parseFloat(gem)>=2?GOUD:ROOD}}>{gem}</div>
                  <div style={{fontSize:9,color:WITD,marginTop:4}}>{ps.length} partijen</div>
                  <div style={{fontSize:9,color:GRNT}}>{Math.round(ps.filter(p=>p.gem>=2).length/Math.max(ps.length,1)*100)}% boven 2.0</div>
                </div>
              ))}
            </div>
            <div style={{textAlign:"center",padding:"8px",background:"#1a3019",borderRadius:8}}>
              {parseFloat(g2)>parseFloat(g1)
                ?<span style={{color:GRNT}}>↑ Tweede helft {(g2-g1).toFixed(2)} hoger — progressie!</span>
                :<span style={{color:ROOD}}>↓ Eerste helft {(parseFloat(g1)-parseFloat(g2)).toFixed(2)} hoger</span>
              }
            </div>
          </div>
          <div style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"12px"}}>
            <div style={{fontSize:11,color:GOUD,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Per maand</div>
            {maandGroepen.map(([naam,ps])=>{
              const gem=(ps.reduce((a,p)=>a+p.tot,0)/ps.reduce((a,p)=>a+p.n,0)).toFixed(2);
              const k=parseFloat(gem)>=2.5?GRNT:parseFloat(gem)>=2?GOUD:WITD;
              return(
                <div key={naam} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                    <span style={{fontSize:12,color:WITD}}>{naam} <span style={{fontSize:9,color:WITD}}>({ps.length}p)</span></span>
                    <span style={{fontSize:14,fontWeight:"bold",color:k}}>{gem}</span>
                  </div>
                  <DashBalk pct={parseFloat(gem)/4*100} kleur={k}/>
                </div>
              );
            })}
          </div>
        </div>}

        {/* PUNTEN */}
        {tab==="punten"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {kaart("Totaal",totaalPuntenSel,"punten",GOUD)}
            {kaart("Gem.",gemPuntenSel,"per partij",GOUDL)}
            {kaart("Beste partij",top5Punten.length?top5Punten[0].punten:0,top5Punten.length?"p"+top5Punten[0].id:"—",GRNT)}
          </div>

          <div style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"12px"}}>
            <div style={{fontSize:11,color:GOUD,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Beste partijen op punten</div>
            {top5Punten.length===0||top5Punten[0].punten===0
              ?<div style={{fontSize:12,color:WITD}}>Nog geen prestaties behaald in deze selectie.</div>
              :top5Punten.filter(p=>p.punten>0).map(p=>(
                <div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${KBDR}`}}>
                  <span style={{fontSize:11,color:WITD}}>p{p.id} · {fmtDatum(p.datum)} <span style={{color:WITD,opacity:0.7}}>({p.badges.length} badges)</span></span>
                  <span style={{fontSize:13,fontWeight:"bold",color:GOUD}}>{p.punten}pt</span>
                </div>
              ))
            }
          </div>

          <div style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"12px"}}>
            <div style={{fontSize:11,color:GOUD,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Meest behaalde prestaties</div>
            {badgeFrequentie.length===0
              ?<div style={{fontSize:12,color:WITD}}>Nog geen prestaties behaald in deze selectie.</div>
              :badgeFrequentie.map(([label,d])=>(
                <div key={label} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${KBDR}`}}>
                  <span style={{fontSize:11,color:WITD}}>{d.emoji} {label} <span style={{color:WITD,opacity:0.7}}>×{d.aantal}</span></span>
                  <span style={{fontSize:12,fontWeight:"bold",color:GOUD}}>{d.punten}pt</span>
                </div>
              ))
            }
          </div>
        </div>}

      </div>
    </div>
  );
}


function LogPartijRij({p,nr,prestatie}){
  const [open,setOpen]=useState(false);
  const st=stat(p.beurten);
  const punten=prestatie?prestatie.punten:0;
  return(
    <div style={{background:KBG,border:"1px solid "+KBDR,borderRadius:10,marginBottom:10}}>
      <button onClick={function(){setOpen(function(v){return !v;});}}
        style={{width:"100%",background:"none",border:"none",color:"inherit",cursor:"pointer",fontFamily:"inherit",padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",textAlign:"left"}}>
        <div>
          <div style={{fontSize:13,color:GOUD}}>p{nr} - {new Date(p.datum).toLocaleDateString("nl-NL",{weekday:"short",day:"numeric",month:"short"})}{p.tafel&&<span style={{fontSize:10,color:WITD,marginLeft:6,border:"1px solid "+KBDR,borderRadius:4,padding:"1px 5px"}}>{p.tafel==="210"?"2,10":"2,30"}</span>}{punten>0&&<span style={{fontSize:10,color:GOUD,marginLeft:6,border:"1px solid "+GOUD,borderRadius:4,padding:"1px 5px"}}>{punten}pt</span>}</div>
          {st&&<div style={{fontSize:11,color:WITD,marginTop:2}}>{st.totCar} car - {st.aantalBeurten}b - gem {st.gemPerBeurt} - max {st.max} - {st.poedels}x poedel</div>}
        </div>
        <span style={{color:GOUD,fontSize:14,marginLeft:8}}>{open?"▲":"▼"}</span>
      </button>
      {open&&(
        <div style={{padding:"0 14px 12px"}}>
          <PrestatieOverzicht prestatie={prestatie}/>
          {[].concat(p.beurten).reverse().map(function(b,i){return <LogRij key={b.id} b={b} nr={p.beurten.length-i}/>;}) }
        </div>
      )}
    </div>
  );
}

function BiljartTracker(){
  const [data,setData]=useState(null);
  const [tab,setTab]=useState("spelen");
  const [car,setCar]=useState(0);
  const [inp,setInp]=useState("0");
  const [beurtNr,setBeurtNr]=useState(1);
  const [sel,setSel]=useState(new Set());
  const [fase,setFase]=useState("setup");
  const [lp,setLp]=useState([]);
  const [doel,setDoel]=useState(25);
  const [doelType,setDoelType]=useState("beurten");
  const [tafel,setTafel]=useState("230");
  const [confPartij,setConfPartij]=useState(false);
  const [confReset,setConfReset]=useState(false);
  const [aiBezig,setAiBezig]=useState(false);
  const [aiRes,setAiRes]=useState("");
  const [aiType,setAiType]=useState("");
  const [gekopieerd,setGekopieerd]=useState("");
  const [toonData,setToonData]=useState(false);
  const inputRef=useRef(null);

  const prestatiesMap=useMemo(function(){
    const arr=berekenPrestaties(data?data.partijen:[]);
    const m={};
    arr.forEach(function(r){m[r.id]=r;});
    return m;
  },[data]);

  useEffect(function(){laadData().then(setData);},[]);
  if(!data)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:GOUD,fontSize:18,background:G}}>Laden...</div>;

  const alleP=data.partijen;
  const stL=stat(lp);
  const ptsNu=pts(car);
  const totCarLp=lp.reduce(function(a,b){return a+b.caramboles;},0);
  const voortgang=doelType==="beurten"?lp.length:totCarLp;
  const progPct=Math.min(100,Math.round(voortgang/doel*100));

  function toggle(key){setSel(function(prev){const n=new Set(prev);n.has(key)?n.delete(key):n.add(key);return n;});}

  function noteer(){
    const gemist=Array.from(sel).filter(function(k){return k.startsWith("G__");}).map(function(k){return k.replace("G__","");});
    const goed=Array.from(sel).filter(function(k){return k.startsWith("P__");}).map(function(k){return k.replace("P__","");});
    const b={id:data.huidigeId,caramboles:car,punten:ptsNu,gemist:gemist,goed:goed,tijd:new Date().toISOString()};
    const nd=Object.assign({},data,{huidigeId:data.huidigeId+1});
    setData(nd);slaOp(nd);
    setLp(function(p){return p.concat([b]);});
    setCar(0);setInp("0");setBeurtNr(function(n){return n+1;});setSel(new Set());setFase("invoer");
  }

  function sluit(){
    if(!lp.length){setConfPartij(false);return;}
    const st=stat(lp);
    const p=Object.assign({id:data.huidigeId,datum:new Date().toISOString(),tafel:tafel,doel:doel,doelType:doelType,beurten:lp},st);
    const nd={partijen:data.partijen.concat([p]),huidigeId:data.huidigeId+1};
    setData(nd);slaOp(nd);
    setLp([]);setBeurtNr(1);setCar(0);setInp("0");setSel(new Set());
    setConfPartij(false);setFase("setup");
  }

  function resetAlles(){
    const leeg={partijen:[],huidigeId:1};
    setData(leeg);slaOp(leeg);setLp([]);setBeurtNr(1);setCar(0);setInp("0");
    setSel(new Set());setConfReset(false);setFase("setup");
  }

  function bouwTekst(){
    const stA=stat(alleP.flatMap(function(p){return p.beurten;}));
    const r=["BILJART DATA — "+new Date().toLocaleDateString("nl-NL",{weekday:"long",day:"numeric",month:"long",year:"numeric"}),"========================================"];
    if(stA)r.push("TOTAAL: "+alleP.length+" partijen · "+stA.totCar+"car · gem "+stA.gemPerBeurt+" · max "+stA.max+" · "+stA.poedels+" poedels · "+stA.totPunten+"pt");
    var alleOmgekeerd=[].concat(alleP).reverse();
    alleOmgekeerd.forEach(function(p,i){
      const st=stat(p.beurten);
      r.push("");
      r.push("Partij "+(alleP.length-i)+" · "+new Date(p.datum).toLocaleDateString("nl-NL",{weekday:"long",day:"numeric",month:"long"})+(p.tafel?" · Tafel "+(p.tafel==="210"?"2,10x1,05":"2,30x1,15"):""));
      if(st)r.push(st.aantalBeurten+"b · max "+st.max+" · gem "+st.gemPerBeurt+" · "+st.poedels+"x poedel · "+st.totPunten+"pt · "+st.opbouw5+"x5+");
      p.beurten.forEach(function(b,j){
        const g=(b.gemist||[]).join(", ");
        const gd=(b.goed||[]).join(", ");
        var rule="  B"+(j+1)+": "+b.caramboles+"car"+(pts(b.caramboles)>0?" +"+pts(b.caramboles)+"pt":"")+(b.caramboles===0?" [poedel]":"");
        if(g)rule+=" - Gemist: "+g;
        if(gd)rule+=" - Goed: "+gd;
        r.push(rule);
      });
    });
    return r.join("\n");
  }

  function kopieer(tekst,key){
    var el=document.createElement("textarea");
    el.value=tekst;
    el.setAttribute("readonly","");
    el.style.position="absolute";
    el.style.left="-9999px";
    document.body.appendChild(el);
    el.select();
    document.execCommand("copy");
    document.body.removeChild(el);
    setGekopieerd(key);
    setTimeout(function(){setGekopieerd("");},2500);
  }

  function vraagAI(type){
    setAiBezig(true);setAiType(type);setAiRes("");
    const sys=type==="partij"
      ?"Je bent een biljartcoach voor carambole/libre. Analyseer de meest recente partij. Geef: Wat goed, Grootste rem, Foutpatronen, Trainingsadvies, Focus. Antwoord in het Nederlands, beknopt."
      :"Je bent een biljartcoach voor carambole/libre. Analyseer trends. Geef: Trend, Vooruitgang, Remmers, Inzicht, Trainingsfocus. Antwoord in het Nederlands, beknopt.";
    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:sys,messages:[{role:"user",content:"Analyseer: "+bouwTekst()}]})
    }).then(function(r){return r.json();}).then(function(json){
      const tekst=(json.content||[]).map(function(c){return c.text||"";}).join("");
      setAiRes(tekst||"Geen resultaat.");
      setAiBezig(false);
    }).catch(function(e){setAiRes("Fout: "+e.message);setAiBezig(false);});
  }

  // ── SETUP ──
  function Setup(){
    return(
      <div style={{flex:1,display:"flex",flexDirection:"column",padding:"12px 14px",gap:10,overflowY:"auto"}}>
        <div style={{textAlign:"center",color:GOUD,fontSize:15,fontWeight:"bold"}}>Nieuwe partij</div>
        <div style={{background:KBG,border:"1px solid "+KBDR,borderRadius:10,padding:"12px 14px"}}>
          <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:2,color:WITD,marginBottom:8}}>Tafelmaat</div>
          <div style={{display:"flex",gap:8}}>
            <button style={{flex:1,padding:"10px 8px",background:tafel==="210"?"#2d4a1e":"none",border:"1px solid "+(tafel==="210"?GOUD:KBDR),borderRadius:8,color:tafel==="210"?GOUD:WITD,cursor:"pointer",fontFamily:"inherit",fontSize:13}}
              onClick={function(){setTafel("210");}}>2,10 x 1,05</button>
            <button style={{flex:1,padding:"10px 8px",background:tafel==="230"?"#2d4a1e":"none",border:"1px solid "+(tafel==="230"?GOUD:KBDR),borderRadius:8,color:tafel==="230"?GOUD:WITD,cursor:"pointer",fontFamily:"inherit",fontSize:13}}
              onClick={function(){setTafel("230");}}>2,30 x 1,15</button>
          </div>
        </div>
        <div style={{background:KBG,border:"1px solid "+KBDR,borderRadius:10,padding:"12px 14px"}}>
          <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:2,color:WITD,marginBottom:8}}>Partij doel</div>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <button style={{flex:1,padding:"10px 8px",background:doelType==="beurten"?"#2d4a1e":"none",border:"1px solid "+(doelType==="beurten"?GOUD:KBDR),borderRadius:8,color:doelType==="beurten"?GOUD:WITD,cursor:"pointer",fontFamily:"inherit",fontSize:13}}
              onClick={function(){setDoelType("beurten");}}>Beurten</button>
            <button style={{flex:1,padding:"10px 8px",background:doelType==="caramboles"?"#2d4a1e":"none",border:"1px solid "+(doelType==="caramboles"?GOUD:KBDR),borderRadius:8,color:doelType==="caramboles"?GOUD:WITD,cursor:"pointer",fontFamily:"inherit",fontSize:13}}
              onClick={function(){setDoelType("caramboles");}}>Caramboles</button>
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:20,marginBottom:12}}>
            <button style={{width:44,height:44,borderRadius:"50%",background:"none",border:"2px solid "+GOUD,color:GOUD,fontSize:24,cursor:"pointer"}}
              onClick={function(){setDoel(function(n){return Math.max(5,n-5);});}}>-</button>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:44,fontWeight:"bold",color:WIT,lineHeight:1}}>{doel}</div>
              <div style={{fontSize:11,color:WITD,marginTop:2}}>{doelType==="beurten"?"beurten":"caramboles"}</div>
            </div>
            <button style={{width:44,height:44,borderRadius:"50%",background:"none",border:"2px solid "+GOUD,color:GOUD,fontSize:24,cursor:"pointer"}}
              onClick={function(){setDoel(function(n){return n+5;});}}>+</button>
          </div>
          <div style={{display:"flex",gap:6}}>
            {(doelType==="beurten"?[15,20,25,30]:[50,75,100,150]).map(function(n){
              return <button key={n} style={{flex:1,padding:"7px 0",background:doel===n?"#2d4a1e":"none",border:"1px solid "+(doel===n?GOUD:KBDR),borderRadius:6,color:doel===n?GOUD:WITD,cursor:"pointer",fontFamily:"inherit",fontSize:12}}
                onClick={function(){setDoel(n);}}>{n}</button>;
            })}
          </div>
        </div>
        {lp.length>0&&(
          <div style={{background:"#1a2e10",border:"1px solid "+GOUD,borderRadius:10,padding:"10px 14px",fontSize:12,color:WITD}}>
            Lopende partij: {lp.length} beurten - {totCarLp} car - tafel {tafel==="210"?"2,10":"2,30"}
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <button style={{flex:1,padding:8,background:"none",border:"1px solid "+GOUD,borderRadius:6,color:GOUD,cursor:"pointer",fontFamily:"inherit",fontSize:12}}
                onClick={function(){setFase("invoer");}}>Doorgaan</button>
              <button style={{flex:1,padding:8,background:"#7a3030",border:"none",borderRadius:6,color:WIT,cursor:"pointer",fontFamily:"inherit",fontSize:12}}
                onClick={function(){setConfPartij(true);}}>Afsluiten</button>
            </div>
          </div>
        )}
        <button style={{padding:18,background:"linear-gradient(135deg,"+GOUD+","+GOUDL+")",border:"none",borderRadius:12,color:G,fontSize:17,fontWeight:"bold",cursor:"pointer",fontFamily:"inherit"}}
          onClick={function(){setLp([]);setBeurtNr(1);setCar(0);setInp("0");setSel(new Set());setFase("invoer");}}>
          Start partij
        </button>
      </div>
    );
  }

  // ── INVOER ──
  function Invoer(){
    const s57=lp.filter(function(b){return b.caramboles>=5&&b.caramboles<=7;}).length;
    const s89=lp.filter(function(b){return b.caramboles>=8&&b.caramboles<=9;}).length;
    const s10=lp.filter(function(b){return b.caramboles>=10;}).length;
    const poedels=lp.filter(function(b){return b.caramboles===0;}).length;
    const poedelPct=lp.length>0?Math.round(poedels/lp.length*100):0;
    const opbouwPct=lp.length>0?Math.round((stL?stL.opbouw5:0)/lp.length*100):0;
    return(
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{height:3,background:KBDR,flexShrink:0}}>

        <div style={{padding:"10px 12px 6px",flexShrink:0}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:6}}>
            {[["Gespeeld",lp.length,WIT],["Caramboles",stL?stL.totCar:0,GOUD],["Gem.",stL?stL.gemPerBeurt:"0.00",GOUDL],["Punten",stL?stL.totPunten:0,"#e8a84c"]].map(function(arr){

                <div key={arr[0]} style={{textAlign:"center",background:"#182e14",border:"1px solid "+KBDR,borderRadius:8,padding:"7px 2px"}}>

                  <div style={{fontSize:8,color:WITD,marginTop:3,textTransform:"uppercase",letterSpacing:0.5}}>{arr[0]}</div>
                </div>
              );
            })}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 2fr",gap:6,marginBottom:6}}>
            <div style={{background:"#182e14",border:"1px solid "+KBDR,borderRadius:8,padding:"7px 6px",textAlign:"center"}}>
              <div style={{fontSize:18,fontWeight:"bold",color:GRNT,lineHeight:1}}>{stL?stL.opbouw5:0}x</div>
              <div style={{fontSize:8,color:WITD,marginTop:3,textTransform:"uppercase",letterSpacing:0.5}}>Opbouw 5+</div>
              <div style={{fontSize:10,color:GRNT,marginTop:1}}>{opbouwPct}%</div>
            </div>
            <div style={{background:"#182e14",border:"1px solid "+KBDR,borderRadius:8,padding:"7px 6px",textAlign:"center"}}>
              <div style={{fontSize:18,fontWeight:"bold",color:poedels>0?"#e08055":WITD,lineHeight:1}}>{poedels}x</div>
              <div style={{fontSize:8,color:WITD,marginTop:3,textTransform:"uppercase",letterSpacing:0.5}}>Poedels</div>
              <div style={{fontSize:10,color:poedels>0?"#e08055":WITD,marginTop:1}}>{poedelPct}%</div>
            </div>
            <div style={{background:"#182e14",border:"1px solid "+KBDR,borderRadius:8,padding:"7px 8px"}}>
              <div style={{fontSize:8,color:WITD,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>Series</div>
              <div style={{display:"flex",gap:4,justifyContent:"space-around"}}>
                {[["5-7",s57,"#4caf50"],["8-9",s89,"#e8c96a"],["10+",s10,"#ff9f40"]].map(function(arr){
                  return(
                    <div key={arr[0]} style={{textAlign:"center"}}>
                      <div style={{fontSize:16,fontWeight:"bold",color:arr[1]>0?arr[2]:KBDR}}>{arr[1]}</div>
                      <div style={{fontSize:8,color:WITD}}>{arr[0]}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
          {lp.length>1&&(
            <div style={{background:"#182e14",border:"1px solid "+KBDR,borderRadius:8,padding:"6px 8px"}}>
              <Grafiek beurten={lp}/>
            </div>
          )}
        </div>
        <div style={{padding:"8px 12px 10px",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:18,marginBottom:4}}>
            <button style={{width:46,height:46,borderRadius:"50%",background:"none",border:"2px solid "+GOUD,color:GOUD,fontSize:24,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}
              onClick={function(){const n=Math.max(0,car-1);setCar(n);setInp(String(n));}}>-</button>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:11,color:WITD,marginBottom:4}}>{beurtNr}e Beurt</div>
              <input ref={inputRef} type="number" inputMode="numeric" pattern="[0-9]*" value={inp}
                onChange={function(e){const v=e.target.value;if(v===""||v==="-"){setInp(v);return;}const n=parseInt(v);if(!isNaN(n)&&n>=0){setCar(n);setInp(String(n));};}}
                onFocus={function(e){e.target.select();}}
                onKeyDown={function(e){if(e.key==="Enter")setFase("gemist");}}
                style={{width:86,fontSize:48,fontWeight:"bold",color:WIT,background:"transparent",border:"none",borderBottom:"3px solid "+(car>=5?GRNT:GOUD),textAlign:"center",fontFamily:"Georgia,serif",outline:"none",paddingBottom:3}}
              />
              <div style={{fontSize:11,color:car>=5?GRNT:GOUD,marginTop:4}}>
                {car===0?"Poedel":car<3?"Nog "+(3-car)+" voor een punt":ptsNu+" punt"+(ptsNu!==1?"en":"")+(car>=5?" ":"")+(car>=5?"🎯":"")}
              </div>
            </div>
            <button style={{width:46,height:46,borderRadius:"50%",background:"none",border:"2px solid "+GOUD,color:GOUD,fontSize:24,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}
              onClick={function(){const n=car+1;setCar(n);setInp(String(n));}}>+</button>
          </div>
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <button style={{flex:1,padding:14,background:"linear-gradient(135deg,"+GOUD+","+GOUDL+")",border:"none",borderRadius:12,color:G,fontSize:16,fontWeight:"bold",cursor:"pointer",fontFamily:"inherit"}}
              onClick={function(){setFase("gemist");}}>Volgende</button>
            <button style={{padding:"14px 13px",background:"none",border:"1px solid "+KBDR,borderRadius:12,color:WITD,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}
              onClick={function(){if(lp.length){setLp(function(p){return p.slice(0,-1);});setBeurtNr(function(n){return Math.max(1,n-1);});}}}>terug</button>
          </div>
        </div>
      </div>
    );
  }

  // ── GEMIST ──
  function Gemist(){
    const gs=Array.from(sel).filter(function(k){return k.startsWith("G__");});
    return(
      <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
        <div>
          <div style={{padding:"7px 14px",borderBottom:"1px solid "+KBDR,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:12,color:ROOD,fontWeight:"bold"}}>Gemist door - {car} caramboles</div>
            {gs.length>0&&<span style={{fontSize:11,color:ROOD}}>{gs.length}x</span>}
          </div>
          <OpmGrid lijst={GEMIST} prefix="G__" kleur={ROOD} geselecteerd={sel} toggle={toggle}/>
        </div>
        <div style={{padding:"10px 14px",display:"flex",gap:8}}>
          <button style={{flex:1,padding:15,background:"linear-gradient(135deg,"+GOUD+","+GOUDL+")",border:"none",borderRadius:12,color:G,fontSize:15,fontWeight:"bold",cursor:"pointer",fontFamily:"inherit"}}
            onClick={function(){if(car===0){noteer();}else{setFase("goed");}}}>
          {car===0?"Opslaan":"Wat ging goed?"}
        </button>
          <button style={{padding:"15px 12px",background:"none",border:"1px solid "+KBDR,borderRadius:12,color:WITD,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}
            onClick={function(){setFase("invoer");}}>terug</button>
        </div>
      </div>
    );
  }

  // ── GOED ──
  function Goed(){
    const gs=Array.from(sel).filter(function(k){return k.startsWith("P__");});
    return(
      <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
        <div>
          <div style={{padding:"7px 14px",borderBottom:"1px solid "+KBDR,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:12,color:GRNT,fontWeight:"bold"}}>Wat ging goed?</div>
            {gs.length>0&&<span style={{fontSize:11,color:GRNT}}>{gs.length}x</span>}
          </div>
          <OpmGrid lijst={GOED} prefix="P__" kleur={GRNT} geselecteerd={sel} toggle={toggle}/>
        </div>
        <div style={{padding:"10px 14px",display:"flex",gap:8}}>
          <button style={{flex:1,padding:15,background:"linear-gradient(135deg,"+GRNT+",#66bb6a)",border:"none",borderRadius:12,color:WIT,fontSize:15,fontWeight:"bold",cursor:"pointer",fontFamily:"inherit"}}
            onClick={noteer}>Beurt opslaan</button>
          <button style={{padding:"15px 12px",background:"none",border:"1px solid "+KBDR,borderRadius:12,color:WITD,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}
            onClick={function(){setFase("gemist");}}>terug</button>
        </div>
      </div>
    );
  }

  // ── STATS ──
  function Stats(){
    const allB=alleP.flatMap(function(p){return p.beurten;});
    const stA=stat(allB);
    return(
      <div style={{overflowY:"auto",padding:"12px 14px",height:"100%"}}>
        {stA&&(
          <div style={{background:KBG,border:"1px solid "+KBDR,borderRadius:10,padding:"12px 14px",marginBottom:12}}>
            <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:2,color:GOUD,marginBottom:8}}>Alle {alleP.length} partijen</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:8}}>
              {[["Car.",stA.totCar],["Max",stA.max],["Gem",stA.gemPerBeurt],["Beurten",stA.aantalBeurten],["Poedels",stA.poedels],["Punten",stA.totPunten]].map(function(arr){
                return(
                  <div key={arr[0]} style={{textAlign:"center",background:"#1a3019",borderRadius:8,padding:"8px 4px"}}>
                    <div style={{fontSize:22,fontWeight:"bold",color:GOUD}}>{arr[1]}</div>
                    <div style={{fontSize:10,color:WITD}}>{arr[0]}</div>
                  </div>
                );
              })}
            </div>
            <div style={{fontSize:11,color:GRNT}}>Opbouw: {stA.opbouw5}/{stA.aantalBeurten} beurten 5+</div>
          </div>
        )}
        <div style={{background:KBG,border:"1px solid "+KBDR,borderRadius:10,padding:"12px 14px",marginBottom:12}}>
          <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:2,color:GOUD,marginBottom:8}}>Per partij</div>
          {[].concat(alleP).reverse().map(function(p,i){return <PartijRij key={p.id} p={p} nr={alleP.length-i} prestatie={prestatiesMap[p.id]}/>;}) }
        </div>
                {!confReset
          ?<button style={{width:"100%",padding:10,background:"none",border:"1px solid #7a3030",borderRadius:8,color:"#e06060",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}
            onClick={function(){setConfReset(true);}}>Alle data wissen</button>
          :<div style={{background:"#2a1515",border:"1px solid #7a3030",borderRadius:8,padding:"12px 14px"}}>
            <div style={{fontSize:12,color:"#e06060",marginBottom:10}}>Weet je het zeker?</div>
            <div style={{display:"flex",gap:8}}>
              <button style={{flex:1,padding:10,background:"#7a3030",border:"none",borderRadius:6,color:WIT,cursor:"pointer",fontFamily:"inherit",fontSize:12}} onClick={resetAlles}>Ja, wis alles</button>
              <button style={{flex:1,padding:10,background:"none",border:"1px solid "+KBDR,borderRadius:6,color:WITD,cursor:"pointer",fontFamily:"inherit",fontSize:12}} onClick={function(){setConfReset(false);}}>Annuleer</button>
            </div>
          </div>}
      </div>
    );
  }

  // ── DATA ──
  function Data(){
    const dataTekst=bouwTekst();
    return(
      <div style={{overflowY:"auto",padding:"12px 14px",height:"100%"}}>
        <div style={{background:KBG,border:"1px solid "+KBDR,borderRadius:10,padding:"12px 14px",marginBottom:12}}>
          <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:2,color:GOUD,marginBottom:10}}>AI Analyse</div>
          <div style={{display:"flex",gap:8,marginBottom:aiRes?12:0}}>
            <button style={{flex:1,padding:12,background:"none",border:"1px solid "+GOUD,borderRadius:8,color:GOUD,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}
              onClick={function(){vraagAI("partij");}} disabled={aiBezig}>{aiBezig&&aiType==="partij"?"Laden...":"Partij analyse"}</button>
            <button style={{flex:1,padding:12,background:"none",border:"1px solid "+GOUD,borderRadius:8,color:GOUD,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}
              onClick={function(){vraagAI("trend");}} disabled={aiBezig}>{aiBezig&&aiType==="trend"?"Laden...":"Trend analyse"}</button>
          </div>
          {aiRes&&(
            <div style={{background:"#1a2e1a",border:"1px solid "+KBDR,borderRadius:8,padding:12,fontSize:12,color:WITD,lineHeight:1.7,whiteSpace:"pre-wrap",marginTop:12}}>
              {aiRes}
              <button style={{display:"block",marginTop:8,background:"none",border:"1px solid "+KBDR,borderRadius:5,color:WITD,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}
                onClick={function(){kopieer(aiRes,"ai");}}>
                {gekopieerd==="ai"?"Gekopieerd!":"Kopieer analyse"}
              </button>
            </div>
          )}
        </div>
        <button style={{width:"100%",padding:14,background:"linear-gradient(135deg,"+GOUD+","+GOUDL+")",border:"none",borderRadius:10,color:G,fontSize:15,fontWeight:"bold",cursor:"pointer",fontFamily:"inherit",marginBottom:12}}
          onClick={function(){kopieer(dataTekst,"data");setToonData(function(v){return !v;});}}>
          {gekopieerd==="data"?"Gekopieerd!":"Kopieer data"}
        </button>
        {toonData&&(
          <div>
            <div style={{fontSize:10,color:WITD,marginBottom:6}}>Selecteer alles hieronder en kopieer:</div>
            <textarea readOnly value={dataTekst}
              onClick={function(e){e.target.select();}}
              style={{width:"100%",height:220,background:"#0d1f0d",border:"1px solid "+KBDR,borderRadius:8,color:WITD,fontSize:10,padding:8,fontFamily:"monospace",resize:"none"}}/>
          </div>
        )}
      </div>
    );
  }

  // ── LOG ──
  function Log(){
    return(
      <div style={{overflowY:"auto",padding:"12px 14px",height:"100%"}}>
        {lp.length>0&&(
          <div style={{background:KBG,border:"2px solid "+GOUD,borderRadius:10,padding:"12px 14px",marginBottom:10}}>
            <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:2,color:GOUD,marginBottom:8}}>Lopende partij</div>
            {[].concat(lp).reverse().map(function(b,i){return <LogRij key={b.id} b={b} nr={lp.length-i}/>;}) }
          </div>
        )}
        {[].concat(alleP).reverse().map(function(p,pi){
          return <LogPartijRij key={p.id} p={p} nr={alleP.length-pi} prestatie={prestatiesMap[p.id]}/>;
        })}
      </div>
    );
  }

  const LOGO_SVG = [
  '<svg width="44" height="44" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">',
  '<defs>',
  '<radialGradient id="lbg" cx="50%" cy="50%"><stop offset="0%" stop-color="#1e3a1e"/><stop offset="100%" stop-color="#0d1f0d"/></radialGradient>',
  '<radialGradient id="lwit" cx="35%" cy="30%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#b0aa90"/></radialGradient>',
  '<radialGradient id="lrood" cx="35%" cy="30%"><stop offset="0%" stop-color="#f07070"/><stop offset="100%" stop-color="#901010"/></radialGradient>',
  '<radialGradient id="lgeel" cx="35%" cy="30%"><stop offset="0%" stop-color="#f5e060"/><stop offset="100%" stop-color="#a07010"/></radialGradient>',
  '</defs>',
  '<circle cx="50" cy="50" r="49" fill="url(#lbg)"/>',
  '<circle cx="50" cy="50" r="49" fill="none" stroke="#c9a84c" stroke-width="1.5"/>',
  '<line x1="10" y1="14" x2="41" y2="58" stroke="#5a3a08" stroke-width="4.5" stroke-linecap="round"/>',
  '<line x1="10" y1="14" x2="41" y2="58" stroke="#c9a84c" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>',
  '<line x1="90" y1="14" x2="59" y2="58" stroke="#5a3a08" stroke-width="4.5" stroke-linecap="round"/>',
  '<line x1="90" y1="14" x2="59" y2="58" stroke="#c9a84c" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>',
  '<circle cx="50" cy="38" r="14" fill="url(#lrood)"/>',
  '<circle cx="44" cy="32" r="4.5" fill="white" opacity="0.28"/>',
  '<circle cx="22" cy="68" r="14" fill="url(#lwit)"/>',
  '<circle cx="16" cy="62" r="4.5" fill="white" opacity="0.45"/>',
  '<circle cx="78" cy="68" r="14" fill="url(#lgeel)"/>',
  '<circle cx="72" cy="62" r="4.5" fill="white" opacity="0.4"/>',
  '</svg>'
].join('');

  return(
    <div className="app">
      <div style={{background:"linear-gradient(135deg,#0d1f0d,#1a2e1a)",borderBottom:"2px solid "+GOUD,padding:"9px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div dangerouslySetInnerHTML={{__html:LOGO_SVG}}/>
          <div>
            <div style={{fontSize:16,fontWeight:"bold",color:GOUD,letterSpacing:1}}>Biljart Tracker</div>
            <div style={{fontSize:9,color:WITD,letterSpacing:2,textTransform:"uppercase"}}>Carambole - Serie registratie</div>
          </div>
        </div>
        {fase!=="setup"&&lp.length>0&&(
          <button style={{background:"none",border:"1px solid "+KBDR,borderRadius:8,color:WITD,padding:"5px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}
            onClick={function(){setConfPartij(true);}}>Afsluiten</button>
        )}
      </div>

      {confPartij&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}}>
          <div style={{background:"#1a2e1a",border:"2px solid "+GOUD,borderRadius:14,padding:24,maxWidth:320,width:"100%"}}>
            <div style={{fontSize:15,color:WIT,marginBottom:6,textAlign:"center"}}>Partij opslaan?</div>
            <div style={{fontSize:12,color:WITD,marginBottom:18,textAlign:"center"}}>{lp.length} beurten - {totCarLp} car{stL?" - gem "+stL.gemPerBeurt:""}</div>
            <div style={{display:"flex",gap:10}}>
              <button style={{flex:1,padding:14,background:GRNT,border:"none",borderRadius:8,color:WIT,cursor:"pointer",fontFamily:"inherit",fontSize:14}} onClick={sluit}>Opslaan</button>
              <button style={{flex:1,padding:14,background:"none",border:"1px solid "+KBDR,borderRadius:8,color:WITD,cursor:"pointer",fontFamily:"inherit",fontSize:14}} onClick={function(){setConfPartij(false);}}>Annuleer</button>
            </div>
          </div>
        </div>
      )}

      <div style={{display:"flex",borderBottom:"1px solid "+KBDR,background:"#152015",flexShrink:0}}>
        {[["spelen","Spelen"],["stats","Stats"],["data","Data"],["log","Log"],["dash","Dash"]].map(function(arr){
          return <button key={arr[0]} style={{flex:1,padding:"11px 0",background:tab===arr[0]?"#1c2c1c":"none",border:"none",color:tab===arr[0]?GOUD:WITD,fontSize:12,cursor:"pointer",fontFamily:"inherit",borderBottom:tab===arr[0]?"2px solid "+GOUD:"2px solid transparent"}}
            onClick={function(){setTab(arr[0]);}}>{arr[1]}</button>;
        })}
      </div>

      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {tab==="spelen"&&(
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            {fase==="setup"&&<Setup/>}
            {fase==="invoer"&&<Invoer/>}
            {fase==="gemist"&&<Gemist/>}
            {fase==="goed"&&<Goed/>}
          </div>
        )}
        {tab==="stats"&&<Stats/>}
        {tab==="data"&&<Data/>}
        {tab==="log"&&<Log/>}
        {tab==="dash"&&<Dashboard partijen={alleP}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(BiljartTracker,null));
</script>
</body>
</html>
