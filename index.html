function berekenStats(beurten){
  if(!beurten||!beurten.length)return null;
  const cars=beurten.map(b=>b.caramboles);
  const totCar=cars.reduce((a,b)=>a+b,0);
  const mx=Math.max(...cars);
  const totPunten=beurten.reduce((a,b)=>a+pts(b.caramboles),0);
  const poedels=beurten.filter(b=>b.caramboles===0).length;
  const gemPerBeurt=(totCar/beurten.length).toFixed(2);
  const opbouw5=beurten.filter(b=>b.caramboles>=5).length;
  const opbouw57=beurten.filter(b=>b.caramboles>=5&&b.caramboles<=7).length;
  const opbouw89=beurten.filter(b=>b.caramboles>=8&&b.caramboles<=9).length;
  const opbouw10=beurten.filter(b=>b.caramboles>=10).length;
  return{totCar,max:mx,totPunten,aantalBeurten:beurten.length,poedels,gemPerBeurt,opbouw5,opbouw57,opbouw89,opbouw10};
}

async function laadData(){

    const r=await window.storage.get(SK);
    if(r){
      const d=JSON.parse(r.value);
      if(d.partijen&&d.partijen.length>0)return d;
    }
  }catch(e){}

}

  catch(e){console.error(e);}
}

function Grafiek({beurten}){
  if(!beurten||beurten.length<2)return null;
  const vals=beurten.map(b=>b.caramboles);
  const maxV=Math.max(...vals,1);
  const ppp=Math.max(8,Math.min(20,280/vals.length));
  const lp=12,tp=18,H=60;
  const W=lp+ppp*(vals.length-1);
  const punten=vals.map((v,i)=>`${lp+i*ppp},${tp+H-(v/maxV)*H}`).join(" ");
  const fs=vals.length>25?8:vals.length>15?9:10;
  return(
    <div style={{overflowX:"auto",paddingBottom:4}}>
      <svg width={W} height={H+tp+10} style={{overflow:"visible",display:"block"}}>
        <polyline points={punten} fill="none" stroke={GOUD} strokeWidth="2" strokeLinejoin="round"/>
        {vals.map((v,i)=>{
          const cx=lp+i*ppp,cy=tp+H-(v/maxV)*H;
          const kleur=v>=10?"#ff9f40":v>=8?"#e8c96a":v>=5?GRNT:GOUD;
          return<g key={i}>
            <circle cx={cx} cy={cy} r={v>=5?4:2.5} fill={kleur}/>
            <text x={cx} y={cy-6} textAnchor="middle" fontSize={fs} fill={kleur} fontFamily="Georgia,serif" fontWeight={v>=5?"bold":"normal"}>{v}</text>
          </g>;
        })}
      </svg>
    </div>
  );
}

  const pct=Math.round(totaal5/n*100);

    <div style={{background:"#1a3019",border:`1px solid ${KBDR}`,borderRadius:10,padding:"12px 14px",marginBottom:12}}>
      <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:2,color:GOUD,marginBottom:8}}>🎯 Opbouw (≥5 caramboles)</div>
      <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:8}}>
        <span style={{fontSize:32,fontWeight:"bold",color:totaal5>0?GRNT:WITD}}>{totaal5}</span>
        <span style={{fontSize:16,color:WITD}}>/ {n} beurten</span>
        <span style={{fontSize:14,color:totaal5>0?GRNT:WITD,marginLeft:4}}>{pct}%</span>
      </div>
      <div style={{display:"flex",gap:8}}>
        {[["5-7",v57,"#4caf50"],["8-9",v89,"#e8c96a"],["10+",v10,"#ff9f40"]].map(([l,v,kleur])=>(
          <div key={l} style={{flex:1,background:v>0?"#2d4a1e":"#1c2e18",border:`1px solid ${v>0?kleur:KBDR}`,borderRadius:8,padding:"6px 4px",textAlign:"center"}}>

            <div style={{fontSize:10,color:WITD,letterSpacing:1}}>{l}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function SerieVerdeling({beurten}){
  const ranges=[{label:"3-4",min:3,max:4},{label:"5-7",min:5,max:7},{label:"8-9",min:8,max:9},{label:"10+",min:10,max:Infinity}];
  return(
    <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
      {ranges.map(r=>{
        const n=beurten.filter(b=>b.caramboles>=r.min&&b.caramboles<=r.max).length;
        return(
          <div key={r.label} style={{background:n>0?"#2d4a1e":"#1c2e18",border:`1px solid ${n>0?GOUD:KBDR}`,borderRadius:8,padding:"6px 10px",textAlign:"center",minWidth:52}}>
            <div style={{fontSize:18,fontWeight:"bold",color:n>0?GOUD:"#5a7a55"}}>{n}×</div>
            <div style={{fontSize:10,color:WITD,letterSpacing:1}}>{r.label}</div>
          </div>
        );
      })}
    </div>
  );
}

function DataExport({allePartijen,lopendePartij,statsAlles}){
  const [gekopieerd,setGekopieerd]=useState("");
  const [aiBezig,setAiBezig]=useState(false);
  const [aiResultaat,setAiResultaat]=useState("");
  const [aiType,setAiType]=useState("");

  function bouwTekst(){
    const r=[];
    const nu=new Date().toLocaleDateString("nl-NL",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
    r.push(`BILJART DATA — ${nu}`);
    r.push("=".repeat(40));
    if(statsAlles){
      r.push("\nTOTAAL OVERZICHT");
      r.push(`Partijen: ${allePartijen.length} · Beurten: ${statsAlles.aantalBeurten} · Caramboles: ${statsAlles.totCar}`);
      r.push(`Hoogste serie: ${statsAlles.max} · Gem/beurt: ${statsAlles.gemPerBeurt} · Poedels: ${statsAlles.poedels} (${Math.round(statsAlles.poedels/statsAlles.aantalBeurten*100)}%) · Punten: ${statsAlles.totPunten}`);
    }
    const lijst=lopendePartij.length>0?[{datum:new Date().toISOString(),beurten:lopendePartij,lopend:true},...allePartijen]:[...allePartijen];
    [...lijst].reverse().forEach((p,i)=>{
      r.push("\n"+"-".repeat(40));
      const datum=new Date(p.datum).toLocaleDateString("nl-NL",{weekday:"long",day:"numeric",month:"long"});
      const st=berekenStats(p.beurten);
      r.push(`${p.lopend?"LOPENDE PARTIJ":`PARTIJ ${i+1}`} · ${datum}`);
      if(!p.lopend&&st){
        r.push(`Beurten: ${st.aantalBeurten} · Max: ${st.max} · Gem: ${st.gemPerBeurt} · Poedels: ${st.poedels} · Punten: ${st.totPunten}`);
        if(p.sessieType)r.push(`Type: ${p.sessieType}`);
      }
      r.push("");
      p.beurten.forEach((b,j)=>{
        const gemist=(b.gemist||[]).join(", ");
        const goed=(b.goed||[]).join(", ");
        const pt=pts(b.caramboles)>0?` (+${pts(b.caramboles)}pt)`:"";
        const poel=b.caramboles===0?" [poedel]":"";
        let regel=`  Beurt ${j+1}: ${b.caramboles} caramboles${pt}${poel}`;
        if(gemist)regel+=` — Gemist: ${gemist}`;
        if(goed)regel+=` — Goed: ${goed}`;
        r.push(regel);
      });
    });
    return r.join("\n");
  }

  async function vraagAI(type){
    setAiBezig(true);setAiType(type);setAiResultaat("");
    const data=bouwTekst();
    let systemPrompt,userPrompt;
    if(type==="partij"){
      systemPrompt=`Je bent een biljartcoach voor carambole/libre. Analyseer de meest recente partij en geef korte concrete feedback in het Nederlands. Geef: ✅ Wat gaat goed ⚠️ Grootste rem 🔍 Foutpatronen (max 3) 🏋️ Trainingsadvies 🎯 Focus volgende sessie`;
      userPrompt=`Analyseer mijn meest recente partij:\n\n${data}`;
    }else{
      systemPrompt=`Je bent een biljartcoach voor carambole/libre. Analyseer trends over meerdere partijen. Geef: 📈 Trend samenvatting ✅ Vooruitgang 🔁 Terugkerende remmers 📌 Belangrijkste trend 🏋️ Trainingsfocus komende week`;
      userPrompt=`Analyseer mijn biljartdata:\n\n${data}`;
    }
    try{
      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:systemPrompt,messages:[{role:"user",content:userPrompt}]})
      });
      const json=await resp.json();
      const tekst=json.content?.map(c=>c.text||"").join("")||"Geen resultaat.";
      setAiResultaat(tekst);
    }catch(e){setAiResultaat("Fout: "+e.message);}
    finally{setAiBezig(false);}
  }

  function kopieer(tekst,sleutel){
    navigator.clipboard.writeText(tekst).then(()=>{setGekopieerd(sleutel);setTimeout(()=>setGekopieerd(""),2500);});
  }

  if(!allePartijen.length&&!lopendePartij.length)
    return<div style={{textAlign:"center",color:WITD,padding:"40px 20px",fontSize:16}}>Nog geen data.</div>;

  return(
    <div>
      <div style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"14px 16px",marginBottom:14}}>
        <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:2,color:GOUD,marginBottom:12}}>🤖 AI Analyse</div>
        <div style={{display:"flex",gap:10,marginBottom:aiResultaat?14:0}}>
          <button style={{flex:1,padding:12,background:"none",border:`1px solid ${GOUD}`,borderRadius:8,color:GOUD,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}
            onClick={()=>vraagAI("partij")} disabled={aiBezig}>
            {aiBezig&&aiType==="partij"?"⏳ Laden…":"🎯 Partijanalyse"}
          </button>
          <button style={{flex:1,padding:12,background:"none",border:`1px solid ${GOUD}`,borderRadius:8,color:GOUD,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}
            onClick={()=>vraagAI("trend")} disabled={aiBezig}>
            {aiBezig&&aiType==="trend"?"⏳ Laden…":"📈 Trendanalyse"}
          </button>
        </div>
        {aiResultaat&&(
          <div style={{marginTop:12,background:"#1a2e1a",border:`1px solid ${KBDR}`,borderRadius:8,padding:14,fontSize:13,color:WITD,lineHeight:1.7,whiteSpace:"pre-wrap"}}>
            {aiResultaat}
            <button style={{display:"block",marginTop:10,background:"none",border:`1px solid ${KBDR}`,borderRadius:6,color:WITD,padding:"5px 12px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}
              onClick={()=>kopieer(aiResultaat,"ai")}>
              {gekopieerd==="ai"?"✓ Gekopieerd!":"📋 Kopieer analyse"}
            </button>
          </div>
        )}
      </div>
      <div style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"14px 16px",marginBottom:14}}>
        <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:2,color:GOUD,marginBottom:12}}>📋 Ruwe data</div>
        <button style={{width:"100%",padding:14,background:`linear-gradient(135deg,${GOUD},${GOUDL})`,border:"none",borderRadius:10,color:G,fontSize:15,fontWeight:"bold",cursor:"pointer",fontFamily:"inherit"}}
          onClick={()=>kopieer(bouwTekst(),"data")}>
          {gekopieerd==="data"?"✓ Gekopieerd!":"📋 Kopieer ruwe data"}
        </button>
      </div>
    </div>
  );
}

function BiljartTracker(){
  const [data,setData]=useState(null);
  const [tab,setTab]=useState("spelen");
  const [bevestigReset,setBevestigReset]=useState(false);
  const [bevestigPartij,setBevestigPartij]=useState(false);
  const [caramboles,setCaramboles]=useState(0);
  const [inputWaarde,setInputWaarde]=useState("0");
  const [beurtNummer,setBeurtNummer]=useState(1);
  const [geselecteerd,setGeselecteerd]=useState(new Set());
  const [fase,setFase]=useState("setup"); // "setup" | "invoer" | "gemist" | "goed"
  const [feedback,setFeedback]=useState("");
  const [lopendePartij,setLopendePartij]=useState([]);
  const [sessieType,setSessieType]=useState("Officieel");
  const [doelType,setDoelType]=useState("beurten");
  const [doelAantal,setDoelAantal]=useState(25);
  const inputRef=useRef(null);

  useEffect(()=>{laadData().then(setData);},[]);

  if(!data)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:GOUD,fontSize:18,background:G}}>Laden…</div>;

  const allePartijen=data.partijen;
  const alleBeurten=allePartijen.flatMap(p=>p.beurten);
  const statsAlles=berekenStats(alleBeurten);
  const statsLopend=berekenStats(lopendePartij);
  const puntenNu=pts(caramboles);

  function toggleOpmerking(key){
    setGeselecteerd(prev=>{const n=new Set(prev);n.has(key)?n.delete(key):n.add(key);return n;});
  }

  function verwerkInput(val){
    if(val===""||val==="-"){setInputWaarde(val);return;}
    const n=parseInt(val);
    if(!isNaN(n)&&n>=0){setCaramboles(n);setInputWaarde(String(n));}
  }

  function startPartij(){
    setFase("invoer");
  }

  function gaVooruit(){
    if(fase==="invoer"){setFase("gemist");return;}
    if(fase==="gemist"){setFase("goed");return;}
    noteerBeurt();
  }

  function knopTekst(){
    if(fase==="invoer") return{groot:"Vastleggen & volgende",klein:"Druk om door te gaan naar opmerkingen"};
    if(fase==="gemist") return{groot:"✓ Vastleggen",klein:"Selecteer wat misging, dan doorgaan"};
    if(fase==="goed") return{groot:"✓ Beurt noteren",klein:"Selecteer wat goed ging, dan opslaan"};
    return{groot:"",klein:""};
  }

  function doelBereikt(){
    if(!lopendePartij.length) return false;
    if(doelType==="beurten") return lopendePartij.length>=doelAantal;
    if(doelType==="caramboles"){
      const tot=lopendePartij.reduce((a,b)=>a+b.caramboles,0);
      return tot>=doelAantal;
    }
    return false;
  }

  function noteerBeurt(){
    const gemist=[...geselecteerd].filter(k=>k.startsWith("GEMIST__")).map(k=>k.replace("GEMIST__",""));
    const goed=[...geselecteerd].filter(k=>k.startsWith("GOED__")).map(k=>k.replace("GOED__",""));
    const b={id:data.huidigeId,caramboles,punten:puntenNu,gemist,goed,tijd:new Date().toISOString()};
    const nd={...data,huidigeId:data.huidigeId+1};
    setData(nd);slaOp(nd);
    setLopendePartij(p=>[...p,b]);
    setCaramboles(0);setInputWaarde("0");
    setBeurtNummer(n=>n+1);
    setGeselecteerd(new Set());
    setFase(doelBereikt()?"invoer":"invoer");
    setFeedback(`Beurt ${beurtNummer} · ${caramboles} car · ${puntenNu>0?`+${puntenNu}pt`:caramboles===0?"poedel":""}`);
    setTimeout(()=>setFeedback(""),2000);
  }

  function sluitPartijAf(){
    if(!lopendePartij.length){setBevestigPartij(false);return;}
    const st=berekenStats(lopendePartij);
    const p={id:data.huidigeId,datum:new Date().toISOString(),beurten:lopendePartij,sessieType,...st};
    const nd={partijen:[...data.partijen,p],huidigeId:data.huidigeId+1};
    setData(nd);slaOp(nd);
    setLopendePartij([]);setBeurtNummer(1);setCaramboles(0);setInputWaarde("0");
    setBevestigPartij(false);setFase("setup");
    setFeedback(`✓ Partij afgesloten · ${st.aantalBeurten} beurten · ${st.totCar} car · 🎯 ${st.opbouw5}×5+`);
    setTimeout(()=>setFeedback(""),3000);
  }

  function verwijderLaatste(){
    if(!lopendePartij.length)return;
    setLopendePartij(p=>p.slice(0,-1));
    setBeurtNummer(n=>Math.max(1,n-1));
  }

  function resetAlles(){
    const leeg={partijen:[],huidigeId:1};
    setData(leeg);slaOp(leeg);
    setLopendePartij([]);setBeurtNummer(1);setCaramboles(0);setInputWaarde("0");
    setGeselecteerd(new Set());setBevestigReset(false);setFase("invoer");
  }

  return(
    <div style={{background:G,minHeight:"100vh",fontFamily:"Georgia,serif",color:WIT,maxWidth:480,margin:"0 auto",paddingBottom:40}}>

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#0d1f0d,#1a2e1a)",borderBottom:`2px solid ${GOUD}`,padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:36,color:GOUD,lineHeight:1}}>◎</span>
          <div>
            <div style={{fontSize:20,fontWeight:"bold",color:GOUD,letterSpacing:1}}>Biljart Tracker</div>
            <div style={{fontSize:12,color:WITD,letterSpacing:2,textTransform:"uppercase"}}>Carambole · Serie registratie</div>
          </div>
        </div>
        {statsAlles&&<div style={{fontSize:11,color:GOUD,border:`1px solid ${GOUD}`,borderRadius:20,padding:"4px 10px",textAlign:"right"}}>{allePartijen.length} partijen · {statsAlles.totPunten} pt</div>}
      </div>

      {/* Tabs */}
      <div style={{display:"flex",borderBottom:`1px solid ${KBDR}`,background:"#152015"}}>
        {[["spelen","⚪ Spelen"],["stats","📊 Stats"],["data","🗂 Data"],["log","📋 Log"]].map(([k,l])=>(
          <button key={k} style={{flex:1,padding:"12px 0",background:tab===k?"#1c2c1c":"none",border:"none",color:tab===k?GOUD:WITD,fontSize:12,cursor:"pointer",fontFamily:"inherit",borderBottom:tab===k?`2px solid ${GOUD}`:"2px solid transparent"}}
            onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>

      <div style={{padding:"16px 14px"}}>

        {/* ══ SPELEN ══ */}
        {tab==="spelen"&&(
          <div>
            {/* FASE: Setup */}
            {fase==="setup"&&(
              <div style={{background:KBG,border:`1px solid ${GOUD}`,borderRadius:12,padding:"20px 16px",marginBottom:14}}>
                <div style={{fontSize:16,fontWeight:"bold",color:GOUD,marginBottom:16,textAlign:"center"}}>🎱 Nieuwe partij instellen</div>
                
                <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:2,color:WITD,marginBottom:10}}>Sessie type</div>
                <div style={{display:"flex",gap:6,marginBottom:20}}>
                  {SESSIE_TYPES.map(t=>(
                    <button key={t.label} style={{flex:1,padding:"8px 4px",background:sessieType===t.label?"#2d4a1e":"none",border:`1px solid ${sessieType===t.label?GOUD:KBDR}`,borderRadius:8,color:sessieType===t.label?GOUD:WITD,fontSize:10,cursor:"pointer",fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}
                      onClick={()=>setSessieType(t.label)}>
                      <span>{t.emoji}</span><span>{t.label}</span>
                    </button>
                  ))}
                </div>

                <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:2,color:WITD,marginBottom:10}}>Partij doel</div>
                <div style={{display:"flex",gap:8,marginBottom:14}}>
                  <button style={{flex:1,padding:"10px 8px",background:doelType==="beurten"?"#2d4a1e":"none",border:`1px solid ${doelType==="beurten"?GOUD:KBDR}`,borderRadius:8,color:doelType==="beurten"?GOUD:WITD,cursor:"pointer",fontFamily:"inherit",fontSize:13}}
                    onClick={()=>setDoelType("beurten")}>🎯 Beurten</button>
                  <button style={{flex:1,padding:"10px 8px",background:doelType==="caramboles"?"#2d4a1e":"none",border:`1px solid ${doelType==="caramboles"?GOUD:KBDR}`,borderRadius:8,color:doelType==="caramboles"?GOUD:WITD,cursor:"pointer",fontFamily:"inherit",fontSize:13}}
                    onClick={()=>setDoelType("caramboles")}>⚪ Caramboles</button>
                </div>

                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:16,marginBottom:20}}>
                  <button style={{width:44,height:44,borderRadius:"50%",background:"none",border:`2px solid ${GOUD}`,color:GOUD,fontSize:24,cursor:"pointer"}}
                    onClick={()=>setDoelAantal(n=>Math.max(1,n-5))}>−</button>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:48,fontWeight:"bold",color:WIT,lineHeight:1}}>{doelAantal}</div>
                    <div style={{fontSize:12,color:WITD,marginTop:4}}>{doelType==="beurten"?"beurten":"caramboles"}</div>
                  </div>
                  <button style={{width:44,height:44,borderRadius:"50%",background:"none",border:`2px solid ${GOUD}`,color:GOUD,fontSize:24,cursor:"pointer"}}
                    onClick={()=>setDoelAantal(n=>n+5)}>+</button>
                </div>

                <div style={{display:"flex",gap:8,marginBottom:8}}>
                  {(doelType==="beurten"?[15,20,25,30]:[50,75,100,150]).map(n=>(
                    <button key={n} style={{flex:1,padding:"6px 0",background:doelAantal===n?"#2d4a1e":"none",border:`1px solid ${doelAantal===n?GOUD:KBDR}`,borderRadius:6,color:doelAantal===n?GOUD:WITD,cursor:"pointer",fontFamily:"inherit",fontSize:12}}
                      onClick={()=>setDoelAantal(n)}>{n}</button>
                  ))}
                </div>

                <button style={{width:"100%",marginTop:16,padding:16,background:`linear-gradient(135deg,${GOUD},${GOUDL})`,border:"none",borderRadius:10,color:G,fontSize:16,fontWeight:"bold",cursor:"pointer",fontFamily:"inherit"}}
                  onClick={startPartij}>🎱 Partij starten</button>
              </div>
            )}

            {/* Sessie type (alleen zichtbaar als partij bezig) */}
            {fase!=="setup"&&(<div style={{display:"flex",gap:6,marginBottom:14}}>
              {SESSIE_TYPES.map(t=>(
                <button key={t.label} style={{flex:1,padding:"6px 4px",background:sessieType===t.label?"#2d4a1e":"none",border:`1px solid ${sessieType===t.label?GOUD:KBDR}`,borderRadius:8,color:sessieType===t.label?GOUD:WITD,fontSize:10,cursor:"pointer",fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}
                  onClick={()=>setSessieType(t.label)}>
                  <span>{t.emoji}</span><span>{t.label}</span>
                </button>
              ))}
            </div>)}

            {/* Top rij - alleen tonen als partij bezig */}
            {fase!=="setup"&&(<div style={{display:"flex",gap:10,marginBottom:14,alignItems:"stretch"}}>
              <div style={{flex:1,background:KBG,border:`1px solid ${KBDR}`,borderRadius:12,padding:14}}>
                <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:2,color:GOUD,marginBottom:4}}>Deze partij</div>
                <div style={{display:"flex",alignItems:"baseline",gap:5}}>
                  <span style={{fontSize:28,fontWeight:"bold",color:WIT}}>{statsLopend?statsLopend.totCar:0}</span>
                  <span style={{fontSize:11,color:WITD}}>car.</span>
                </div>
                <div style={{fontSize:13,color:GOUD,fontWeight:"bold",marginTop:4}}>
                  {statsLopend?statsLopend.totPunten:0} pt
                  {statsLopend&&<span style={{fontSize:12,color:GOUDL,fontWeight:"normal"}}> · gem {statsLopend.gemPerBeurt}</span>}
                </div>
                {statsLopend&&statsLopend.opbouw5>0&&(
                  <div style={{fontSize:12,color:GRNT,marginTop:2}}>🎯 {statsLopend.opbouw5}/{statsLopend.aantalBeurten} opbouw</div>
                )}
              </div>
              <button style={{flex:1,padding:"14px 12px",background:`linear-gradient(155deg,${GOUD},${GOUDL})`,border:"none",borderRadius:12,color:G,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 6px 24px rgba(201,168,76,0.4)",textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,minHeight:100}}
                onClick={gaVooruit}>
                <div style={{fontSize:11,fontWeight:"bold",opacity:0.65,letterSpacing:2,textTransform:"uppercase"}}>Beurt {beurtNummer}</div>
                <div style={{fontSize:17,fontWeight:"bold",textAlign:"center",lineHeight:1.3}}>{fase==="invoer"?"Vastleggen & volgende":fase==="gemist"?"✓ Vastleggen":"✓ Beurt noteren"}</div>
                <div style={{fontSize:11,opacity:0.7,marginTop:2,color:G}}>{fase==="invoer"?"Ga naar opmerkingen →":fase==="gemist"?"Dan naar wat goed ging →":"Opslaan en volgende beurt"}</div>
                <div style={{fontSize:12,opacity:0.7,marginTop:2}}>{caramboles} car{puntenNu>0?` · +${puntenNu}pt`:caramboles===0?" · poedel":""}</div>
              </button>
            </div>)}

            {fase!=="setup"&&<div style={{textAlign:"center",color:GOUD,fontSize:14,marginBottom:14,minHeight:20}}>{feedback||"\u00A0"}</div>}

            {/* FASE: Invoer */}
            {fase!=="setup"&&fase==="invoer"&&(
              <div style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"14px 16px",marginBottom:14}}>
                <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:2,color:GOUD,marginBottom:12}}>Caramboles beurt {beurtNummer}</div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:16,marginBottom:8}}>
                  <button style={{width:52,height:52,borderRadius:"50%",background:"none",border:`2px solid ${GOUD}`,color:GOUD,fontSize:28,cursor:"pointer"}}
                    onClick={()=>{const n=Math.max(0,caramboles-1);setCaramboles(n);setInputWaarde(String(n));}}>−</button>
                  <input
                    ref={inputRef}
                    type="number"
                    inputMode="numeric"
                    pattern="[0-9]*"
                    value={inputWaarde}
                    onChange={e=>verwerkInput(e.target.value)}
                    onFocus={e=>e.target.select()}
                    onKeyDown={e=>{if(e.key==="Enter")gaVooruit();}}
                    style={{width:90,fontSize:52,fontWeight:"bold",color:WIT,background:"transparent",border:"none",borderBottom:`2px solid ${GOUD}`,textAlign:"center",fontFamily:"Georgia,serif",outline:"none",paddingBottom:4}}
                  />
                  <button style={{width:52,height:52,borderRadius:"50%",background:"none",border:`2px solid ${GOUD}`,color:GOUD,fontSize:28,cursor:"pointer"}}
                    onClick={()=>{const n=caramboles+1;setCaramboles(n);setInputWaarde(String(n));}}>+</button>
                </div>
                <div style={{textAlign:"center",fontSize:13,color:GOUD,minHeight:20}}>
                  {caramboles===0?"Typ of tik + voor elke carambole":caramboles<3?`Nog ${3-caramboles} voor een punt`:`${puntenNu} punt${puntenNu!==1?"en":""} ✓${caramboles>=5?" 🎯":""}`}
                </div>
              </div>
            )}

            {/* FASE: Gemist */}
            {fase==="gemist"&&(
              <div style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"14px 16px",marginBottom:14}}>
                <OpmKnoppen titel="Gemist door:" lijst={GEMIST} geselecteerd={geselecteerd} kleur={ROOD} toggle={toggleOpmerking}/>
                {geselecteerd.size>0&&<button style={{background:"none",border:"none",color:WITD,fontSize:11,cursor:"pointer",fontFamily:"inherit",padding:"5px 0"}}
                  onClick={()=>setGeselecteerd(new Set())}>✕ Wis selectie</button>}
              </div>
            )}

            {/* FASE: Goed */}
            {fase==="goed"&&(
              <div style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"14px 16px",marginBottom:14}}>
                <OpmKnoppen titel="Wat ging goed:" lijst={GOED} geselecteerd={geselecteerd} kleur={GRNT} toggle={toggleOpmerking}/>
                {[...geselecteerd].filter(k=>k.startsWith("GOED__")).length>0&&
                  <button style={{background:"none",border:"none",color:WITD,fontSize:11,cursor:"pointer",fontFamily:"inherit",padding:"5px 0"}}
                    onClick={()=>{const n=new Set([...geselecteerd].filter(k=>k.startsWith("GEMIST__")));setGeselecteerd(n);}}>✕ Wis goed-selectie</button>}
              </div>
            )}

            {/* Stap indicator */}
            {fase!=="setup"&&(<div style={{display:"flex",gap:8,marginBottom:14,justifyContent:"center"}}>
              {["invoer","gemist","goed"].map((f,i)=>(
                <div key={f} style={{width:8,height:8,borderRadius:"50%",background:fase===f?GOUD:KBDR}}/>
              ))}
            </div>)}

            {/* Lopende partij */}
            {lopendePartij.length>0&&(
              <div style={{background:KBG,border:`1px solid ${GOUD}`,borderRadius:10,padding:"14px 16px",marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <span style={{fontSize:11,textTransform:"uppercase",letterSpacing:2,color:GOUD}}>Lopende partij · {lopendePartij.length} beurten</span>
                  <button style={{background:"none",border:`1px solid ${KBDR}`,color:WITD,padding:"4px 10px",borderRadius:6,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}
                    onClick={verwijderLaatste}>↩ Ongedaan</button>
                </div>
                {statsLopend&&<div style={{display:"flex",gap:14,flexWrap:"wrap",fontSize:12,color:WITD,marginBottom:10}}>
                  <span>Max <b>{statsLopend.max}</b></span>
                  <span>Gem <b>{statsLopend.gemPerBeurt}</b></span>
                  <span>Poedels <b>{statsLopend.poedels}</b></span>
                  <span style={{color:GRNT}}>🎯 <b>{statsLopend.opbouw5}</b>×5+</span>
                </div>}
                <Grafiek beurten={lopendePartij}/>
                {!bevestigPartij
                  ?<button style={{width:"100%",marginTop:12,padding:12,background:"none",border:`1px solid ${GOUD}`,borderRadius:8,color:GOUD,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}
                    onClick={()=>setBevestigPartij(true)}>🏁 Partij afsluiten ({lopendePartij.length} beurten)</button>
                  :<div style={{marginTop:8,background:"#2a1515",border:"1px solid #7a3030",borderRadius:8,padding:"14px 16px"}}>
                    <div style={{fontSize:13,color:"#e06060",marginBottom:12}}>Partij afsluiten met {lopendePartij.length} beurten?</div>
                    <div style={{display:"flex",gap:10}}>
                      <button style={{flex:1,padding:10,background:"#7a3030",border:"none",borderRadius:6,color:WIT,cursor:"pointer",fontFamily:"inherit",fontSize:13}} onClick={sluitPartijAf}>Ja, afsluiten</button>
                      <button style={{flex:1,padding:10,background:"none",border:`1px solid ${KBDR}`,borderRadius:6,color:WITD,cursor:"pointer",fontFamily:"inherit",fontSize:13}} onClick={()=>setBevestigPartij(false)}>Annuleer</button>
                    </div>
                  </div>}
              </div>
            )}
          </div>
        )}

        {/* ══ STATS ══ */}
        {tab==="stats"&&(
          <div>
            {!statsAlles&&!statsLopend
              ?<div style={{textAlign:"center",color:WITD,padding:"40px 20px",fontSize:16,lineHeight:1.8}}>Nog geen beurten.<br/>Ga spelen! ⚪🔴🟡</div>
              :<>
                {statsLopend&&(
                  <div style={{background:KBG,border:`2px solid ${GOUD}`,borderRadius:10,padding:"14px 16px",marginBottom:14}}>
                    <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:2,color:GOUD,marginBottom:12}}>⏳ Lopende partij · {statsLopend.aantalBeurten} beurten</div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:14}}>
                      {[["Caramboles",statsLopend.totCar],["Hoogste serie",statsLopend.max],["Beurten",statsLopend.aantalBeurten],["Gem. / beurt",statsLopend.gemPerBeurt],["Poedels",statsLopend.poedels],["Punten",statsLopend.totPunten]].map(([l,v])=>(
                        <div key={l} style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"14px 12px",textAlign:"center"}}>
                          <div style={{fontSize:28,fontWeight:"bold",color:GOUD}}>{v}</div>
                          <div style={{fontSize:11,color:WITD,marginTop:4,textTransform:"uppercase",letterSpacing:1}}>{l}</div>
                        </div>
                      ))}
                    </div>
                    <OpbouwIndicator beurten={lopendePartij}/>
                    <Grafiek beurten={lopendePartij}/>
                  </div>
                )}
                {statsAlles&&<>
                  <div style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"14px 16px",marginBottom:14}}>
                    <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:2,color:GOUD,marginBottom:12}}>Alle partijen</div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:14}}>
                      {[["Totaal beurten",statsAlles.aantalBeurten],["Hoogste serie",statsAlles.max],["Totaal caramboles",statsAlles.totCar],["Gem. / beurt",statsAlles.gemPerBeurt],["Totaal punten",statsAlles.totPunten],["Totaal poedels",statsAlles.poedels]].map(([l,v])=>(
                        <div key={l} style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"14px 12px",textAlign:"center"}}>
                          <div style={{fontSize:28,fontWeight:"bold",color:GOUD}}>{v}</div>
                          <div style={{fontSize:11,color:WITD,marginTop:4,textTransform:"uppercase",letterSpacing:1}}>{l}</div>
                        </div>
                      ))}
                    </div>
                    <OpbouwIndicator beurten={alleBeurten}/>
                  </div>
                  <div style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"14px 16px",marginBottom:14}}>
                    <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:2,color:GOUD,marginBottom:12}}>Per partij</div>
                    {[...allePartijen].reverse().map((p,i)=><PartijRij key={p.id} partij={p} nr={allePartijen.length-i}/>)}
                  </div>
                </>}
                {!bevestigReset
                  ?<button style={{width:"100%",padding:12,background:"none",border:"1px solid #7a3030",borderRadius:8,color:"#e06060",cursor:"pointer",fontSize:13,fontFamily:"inherit",marginTop:8}}
                    onClick={()=>setBevestigReset(true)}>🗑 Alle data wissen</button>
                  :<div style={{marginTop:8,background:"#2a1515",border:"1px solid #7a3030",borderRadius:8,padding:"14px 16px"}}>
                    <div style={{fontSize:13,color:"#e06060",marginBottom:12}}>Weet je het zeker? Dit kan niet ongedaan worden.</div>
                    <div style={{display:"flex",gap:10}}>
                      <button style={{flex:1,padding:10,background:"#7a3030",border:"none",borderRadius:6,color:WIT,cursor:"pointer",fontFamily:"inherit",fontSize:13}} onClick={resetAlles}>Ja, wis alles</button>
                      <button style={{flex:1,padding:10,background:"none",border:`1px solid ${KBDR}`,borderRadius:6,color:WITD,cursor:"pointer",fontFamily:"inherit",fontSize:13}} onClick={()=>setBevestigReset(false)}>Annuleer</button>
                    </div>
                  </div>}
          </>}
          </div>
        )}

        {/* ══ DATA ══ */}
        {tab==="data"&&<DataExport allePartijen={allePartijen} lopendePartij={lopendePartij} statsAlles={statsAlles}/>}

        {/* ══ LOG ══ */}
        {tab==="log"&&(
          <div>
            {lopendePartij.length>0&&(
              <div style={{background:KBG,border:`2px solid ${GOUD}`,borderRadius:10,padding:"14px 16px",marginBottom:14}}>
                <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:2,color:GOUD,marginBottom:12}}>⏳ Lopende partij</div>
                {[...lopendePartij].reverse().map((b,i)=><LogRij key={b.id} b={b} nr={lopendePartij.length-i}/>)}
              </div>
            )}
            {!allePartijen.length&&!lopendePartij.length
              ?<div style={{textAlign:"center",color:WITD,padding:"40px 20px"}}>Nog geen beurten.</div>
              :[...allePartijen].reverse().map((p,pi)=>(
                <div key={p.id} style={{background:KBG,border:`1px solid ${KBDR}`,borderRadius:10,padding:"14px 16px",marginBottom:14}}>
                  <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:2,color:GOUD,marginBottom:12}}>
                    Partij {allePartijen.length-pi} · {new Date(p.datum).toLocaleDateString("nl-NL",{weekday:"long",day:"numeric",month:"long"})}
                    {p.sessieType&&<span style={{marginLeft:8,background:"#2a2010",color:"#a08040",borderRadius:4,padding:"2px 6px",fontWeight:"normal"}}>{p.sessieType}</span>}
                  </div>
                  {[...p.beurten].reverse().map((b,i)=><LogRij key={b.id} b={b} nr={p.beurten.length-i}/>)}
                </div>
              ))}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<BiljartTracker/>);
</script>
</body>
</html>
